<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB 阅读器</title>
<style>
/* ===================================================================== */
/* EPUB Reader — Screenshot-accurate Design                              */
/* ===================================================================== */

:root{
  --page-bg:#f2f2f7;--panel-bg:#fff;--accent:#859d94;--accent-hover:#6e867d;
  --accent-light:#dce5e0;--accent-bg:rgba(133,157,148,0.09);--accent-ring:rgba(133,157,148,0.15);
  --text-primary:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;--text-quaternary:#c7c7cc;
  --border:rgba(0,0,0,0.06);--border-strong:rgba(0,0,0,0.10);--bg-input:rgba(0,0,0,0.04);
  --bg-hover:rgba(0,0,0,0.03);--bg-active:rgba(133,157,148,0.09);
  --bg-reading:#fafaf8;--msg-user-bg:#859d94;--msg-user-text:#fff;
  --msg-ai-bg:rgba(133,157,148,0.05);--msg-ai-border:rgba(0,0,0,0.04);--green:#34c759;--yellow:#f59e0b;--red:#ef4444;--red-bg:rgba(239,68,68,0.06);
  --radius-panel:18px;--radius-md:14px;--radius-sm:10px;--radius-xs:6px;
  --shadow-panel:0 4px 20px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.03);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.08);
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',sans-serif;
  --font-reading:'Source Serif 4','PingFang SC',Georgia,serif;
  --content-font-size:18px;--ease:cubic-bezier(0.25,0.1,0.25,1);
}

/* ===================================================================== */
/* Reset                                                                  */
/* ===================================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;font-family:var(--font-ui);background:var(--page-bg);
  color:var(--text-primary);overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:100px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.25)}
::selection{background:rgba(133,157,148,0.18)}

#app{display:flex;flex-direction:column;height:100vh}

/* ===================================================================== */
/* Main Layout — no header, panels fill full height                       */
/* ===================================================================== */
#main{display:flex;flex:1;overflow:hidden;padding:12px;gap:10px;background:var(--page-bg)}

/* ===================================================================== */
/* Sidebar                                                                */
/* ===================================================================== */
#sidebar{
  width:260px;min-width:200px;flex-shrink:0;
  background:rgba(255,255,255,0.72);backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:var(--radius-panel);border:0.5px solid rgba(255,255,255,0.30);
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04),0 8px 40px rgba(0,0,0,0.06);
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}

/* Book info card */
.book-card{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--bg-input);border-radius:var(--radius-md);
}
.book-cover{
  width:44px;height:44px;border-radius:var(--radius-md);background:var(--accent-light);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  flex-shrink:0;color:var(--accent);
}
.book-meta-col{display:flex;flex-direction:column;gap:2px;min-width:0}
.book-card-title{font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-card-author{font-size:12px;color:var(--text-tertiary)}

/* Upload button */
.btn-upload{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;height:38px;font-family:var(--font-ui);font-size:14px;font-weight:500;
  color:var(--text-primary);background:var(--panel-bg);border:1px solid var(--border);
  border-radius:var(--radius-md);cursor:pointer;transition:all 0.2s var(--ease);
}
.btn-upload svg{color:var(--text-secondary)}
.btn-upload:hover{background:var(--bg-hover);border-color:#D1D5DB}
.btn-upload:disabled{color:var(--text-tertiary);cursor:not-allowed;opacity:0.6}

/* Section title */
.section-title{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;font-weight:600;color:var(--text-tertiary);
  text-transform:none;letter-spacing:0;padding:0;
}
.section-title .clear-link{font-size:12px;font-weight:400;color:var(--text-tertiary);cursor:pointer}
.section-title .clear-link:hover{color:var(--red)}

/* History list */
.history-list{display:flex;flex-direction:column;gap:2px}
.history-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--radius-sm);cursor:pointer;font-size:13px;
  color:var(--text-primary);transition:background 0.2s var(--ease);
}
.history-item:hover{background:var(--bg-hover)}
.history-item.active{background:var(--bg-active)}
.history-item .book-info{flex:1;min-width:0}
.history-item .book-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item .book-meta{font-size:12px;color:var(--text-tertiary)}
.history-item .btn-delete{
  width:22px;height:22px;border:none;background:none;border-radius:50%;
  cursor:pointer;font-size:11px;color:var(--text-tertiary);
  display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s var(--ease);
}
.history-item:hover .btn-delete{opacity:1}
.history-item .btn-delete:hover{color:var(--red);background:var(--red-bg)}

/* Search */
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none}
.search-input{
  width:100%;height:36px;padding:0 32px 0 32px;font-family:var(--font-ui);font-size:13px;
  border:none;border-radius:var(--radius-md);background:var(--bg-input);
  color:var(--text-primary);outline:none;transition:background 0.2s var(--ease);
}
.search-input:focus{background:rgba(0,0,0,0.06)}
.search-input::placeholder{color:var(--text-tertiary)}
.search-clear-btn{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;border:none;background:none;cursor:pointer;
  color:var(--text-tertiary);font-size:13px;line-height:1;border-radius:50%;padding:0;display:none;
}

/* Chapter list */
.chapter-list{display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto;min-height:120px}
.chapter-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;height:40px;
  border-radius:var(--radius-sm);cursor:pointer;font-size:13px;
  transition:background 0.2s var(--ease);
}
.chapter-item:hover{background:var(--bg-hover)}
/* Chapter status indicator — screenshot style */
.ch-indicator{
  width:18px;height:18px;border-radius:50%;flex-shrink:0;position:relative;
  border:2px solid #D1D5DB;transition:all 0.2s var(--ease);
}
.ch-indicator .ch-dot{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:var(--text-tertiary)}
.chapter-item input[type=checkbox]{display:none}
.chapter-item:has(input:checked) .ch-indicator{background:var(--accent);border-color:var(--accent)}
.chapter-item:has(input:checked) .ch-indicator::after{
  content:'';position:absolute;left:4px;top:2px;width:6px;height:10px;
  border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);
}
/* Select-all row special styling */
#select-all-row .ch-indicator{border-color:var(--accent)}
#select-all-row:has(input:checked) .ch-indicator{background:var(--accent);border-color:var(--accent)}
.chapter-item .chapter-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary)}
.chapter-jump{cursor:pointer}.chapter-jump:hover{color:var(--accent)}
.chapter-item.viewing{background:var(--accent-bg);box-shadow:inset 2px 0 0 var(--accent)}
.chapter-item .chapter-meta{font-size:11px;color:var(--text-tertiary);flex-shrink:0}
.no-results{font-size:12px;color:var(--text-tertiary);text-align:center;padding:20px 0}
.search-highlight{background:rgba(133,157,148,0.2);color:var(--text-primary);padding:1px 2px;border-radius:2px}

/* Sidebar footer */
#sidebar-footer{
  padding:12px 16px;border-top:0.5px solid var(--border);flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
}
.sidebar-stats{display:flex;flex-direction:column;gap:6px}
.sidebar-stats-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.sidebar-stats-row:first-child{color:var(--text-secondary)}
.sidebar-stats-row:last-child{color:var(--text-tertiary);font-size:11px}
#sidebar-footer .progress-bar-wrap{margin:2px 0}
#sidebar-footer .progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
#sidebar-footer .progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width 0.3s;width:0%}
.summary-bar.warning{color:var(--yellow)}.summary-bar.danger{color:var(--red)}
/* ===================================================================== */
/* Dividers                                                               */
/* ===================================================================== */
.divider{
  width:4px;background:transparent;cursor:col-resize;
  flex-shrink:0;position:relative;z-index:5;
}
.divider::after{
  content:'';position:absolute;left:1.5px;top:40px;bottom:40px;
  width:1px;background:var(--border);border-radius:1px;
}
.divider:hover,.divider.dragging{background:var(--accent-ring)}
.divider:hover::after,.divider.dragging::after{background:var(--accent)}
body.drag-resizing,body.drag-resizing *{user-select:none;-webkit-user-select:none}

/* ===================================================================== */
/* Reader                                                                 */
/* ===================================================================== */
#reader{
  width:400px;min-width:280px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:var(--radius-panel);border:0.5px solid rgba(255,255,255,0.30);
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04),0 8px 40px rgba(0,0,0,0.06);
}
#reader-header{
  display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-shrink:0;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);
}
#reader-chapter-nav{font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.font-control{display:flex;border:0.5px solid var(--border);border-radius:16px;overflow:hidden}
.font-btn{
  font-family:var(--font-ui);font-size:11px;font-weight:600;color:var(--text-secondary);
  background:transparent;border:none;cursor:pointer;padding:3px 12px;transition:all 0.15s var(--ease);
}
.font-btn:first-child{border-right:0.5px solid var(--border)}
.font-btn:hover{background:var(--accent-bg);color:var(--accent)}

/* Reader content */
#reader-content{font-size:var(--content-font-size)}
#chat-messages .msg-bubble{font-size:var(--content-font-size)}
#chat-input-area textarea{font-size:var(--content-font-size)}
#reader-content{
  flex:1;overflow-y:auto;padding:60px 80px;background:var(--bg-reading);line-height:1.85;
}
#reader-content p{
  font-family:var(--font-reading);font-size:var(--content-font-size);
  line-height:1.8;text-align:justify;text-indent:2em;margin-bottom:24px;color:var(--text-primary);
}
#reader-content p:first-of-type{text-indent:0}
.reader-chapter-title{
  font-family:var(--font-ui);font-size:22px;font-weight:600;color:var(--text-primary);
  margin-bottom:32px;display:block;text-align:center;
}
.reader-chapter-divider{
  text-align:center;color:var(--text-secondary);margin:40px auto;
  font-size:14px;font-weight:500;display:flex;align-items:center;gap:14px;
}
.reader-chapter-divider::before,.reader-chapter-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Empty states */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-tertiary);gap:12px;pointer-events:none;
}
.empty-state .empty-icon{font-size:36px;opacity:0.3}
.empty-state .empty-text{font-size:14px}

/* ===================================================================== */
/* Chat Panel                                                             */
/* ===================================================================== */
#chat{
  flex:1;min-width:300px;display:flex;flex-direction:column;overflow:hidden;
  background:rgba(255,255,255,0.72);backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:var(--radius-panel);border:0.5px solid rgba(255,255,255,0.30);
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04),0 8px 40px rgba(0,0,0,0.06);
}

/* Chat status bar */
#chat-status{padding:14px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
#chat-status-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.status-left{display:flex;align-items:center;gap:6px}
.ai-avatar{width:24px;height:24px;border-radius:6px;background:#bcc9c3;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-avatar svg{width:14px;height:14px}
.chat-loaded-indicator{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:4px}
.chat-loaded-indicator::before{display:none}
.chat-loaded-indicator.loaded::before{display:none}
.chat-loaded-indicator.empty::before{display:none}
.chat-header-actions{display:flex;align-items:center;gap:8px}

/* Model badge group — segmented control */
.model-badge-group{display:flex;align-items:center;gap:0;background:var(--panel-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:2px;overflow:hidden}
.model-badge{font-family:var(--font-ui);font-size:12px;font-weight:500;padding:4px 12px;border-radius:var(--radius-sm);cursor:pointer;border:none;background:transparent;color:var(--text-secondary);transition:all 0.15s var(--ease)}
.model-badge:hover{color:var(--text-primary)}
.model-badge.active{background:var(--accent);color:#fff;font-weight:600}

/* Settings icon */
.btn-settings-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--text-tertiary);transition:all 0.2s var(--ease)}
.btn-settings-icon:hover{background:var(--bg-input);color:var(--text-primary)}
.btn-settings-icon svg{width:16px;height:16px}

/* Progress bar */
.progress-bar-wrap{display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s;width:0%}
.progress-fill.green{background:var(--accent)}.progress-fill.yellow{background:var(--yellow)}.progress-fill.red{background:var(--red)}.progress-fill.black{background:var(--text-primary)}
.progress-pct{font-size:11px;color:var(--text-tertiary);font-weight:500;min-width:32px;text-align:right}
.btn-reset{font-family:var(--font-ui);font-size:11px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;padding:2px 8px;border-radius:12px;white-space:nowrap;display:none;transition:all 0.2s var(--ease)}
.btn-reset:hover{color:var(--accent);background:var(--accent-bg)}
.btn-reset.visible{display:inline}

/* Warning bars */
.warning-bar{font-size:11px;color:var(--yellow);padding:6px 10px;background:rgba(245,158,11,0.06);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between}
.warning-bar .close-warn{cursor:pointer;font-size:13px;color:var(--text-tertiary);background:none;border:none;line-height:1;padding:0 2px}

/* Messages */
#chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:24px;position:relative}
#chat-messages .empty-state{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);height:auto}
.msg-system{text-align:center;font-size:11px;color:var(--text-tertiary);padding:4px 0}
.msg-row{display:flex;flex-direction:column;max-width:88%;position:relative;animation:msgFadeIn 0.25s ease-out}
@keyframes msgFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{align-self:flex-end}.msg-row.assistant{align-self:flex-start}
.msg-bubble{padding:12px 14px;border-radius:10px;line-height:1.6;position:relative;word-wrap:break-word}
.msg-row.user .msg-bubble{background:var(--msg-user-bg);color:var(--msg-user-text);border:none;border-bottom-right-radius:4px;box-shadow:0 1px 4px rgba(133,157,148,0.15)}
.msg-row.assistant .msg-bubble{background:var(--msg-ai-bg);color:var(--text-primary);border:0.5px solid var(--msg-ai-border);border-bottom-left-radius:4px;text-align:justify}
.msg-bubble p{margin:0 0 6px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:600}.msg-bubble em{font-style:italic}
.msg-bubble ul,.msg-bubble ol{margin:6px 0;padding-left:20px}
.msg-bubble code{background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px;font-size:0.9em}
.msg-bubble pre{background:rgba(0,0,0,0.04);padding:10px 12px;border-radius:var(--radius-sm);overflow-x:auto;font-size:12px;margin:6px 0}
.msg-bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:6px 0;color:var(--text-secondary)}
.msg-row.streaming .msg-bubble::after{content:'▍';animation:blink 1s step-end infinite;color:var(--text-tertiary);margin-left:2px}
@keyframes blink{50%{opacity:0}}

/* Save mode */
.msg-sel{display:none;position:absolute;left:-28px;top:50%;transform:translateY(-50%);cursor:pointer}
.msg-sel input{display:none}
.msg-sel .cb-box{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border:2px solid var(--text-tertiary);border-radius:50%;transition:all 0.2s var(--ease);background:var(--panel-bg)}
.msg-sel input:checked+.cb-box{background:var(--accent);border-color:var(--accent)}
.msg-sel input:checked+.cb-box::after{content:'';width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px}
.msg-sel .cb-box:hover{border-color:var(--accent)}
.save-mode .msg-sel{display:block}.save-mode .msg-row{margin-left:28px}

/* Message toolbar */
.msg-toolbar{position:absolute;bottom:-30px;right:0;display:flex;gap:2px;opacity:0;transition:opacity 0.15s;background:var(--panel-bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:2px;box-shadow:0 2px 6px rgba(0,0,0,0.06);z-index:5}
.msg-row:hover .msg-toolbar,.msg-toolbar:hover{opacity:1}
.msg-row.user{margin-right:36px}
.toolbar-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:var(--radius-xs);cursor:pointer;color:#1d1d1f;transition:all 0.15s}
.toolbar-btn svg{stroke:currentColor;width:14px;height:14px}
.toolbar-btn:hover{background:var(--bg-input);color:var(--accent)}.toolbar-btn.done{color:var(--accent)}

/* Thinking indicator */
#thinking-bar{display:none;align-items:center;gap:6px;padding:6px 16px;font-size:12px;color:var(--text-tertiary);flex-shrink:0}
#thinking-bar.visible{display:flex}
.dot-pulse{font-family:monospace;width:18px}

/* Input area */
#chat-input-area{padding:12px 16px 10px;border-top:0.5px solid var(--border);flex-shrink:0}
.input-wrap{position:relative;margin-bottom:8px}
.input-wrap textarea{width:100%;min-height:40px;max-height:120px;padding:10px 50px 10px 16px;font-family:var(--font-ui);font-size:14px;line-height:1.5;border:none;border-radius:20px;background:#f0f2f1;color:var(--text-primary);resize:none;outline:none;transition:background 0.2s var(--ease)}
.input-wrap textarea:focus{background:#e8eae9}
.input-wrap textarea::placeholder{color:#9ea3a1}
.btn-send{position:absolute;right:4px;bottom:4px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:var(--accent);border-radius:50%;cursor:pointer;color:#fff;transition:all 0.2s var(--ease)}
.btn-send:hover{background:var(--accent-hover);transform:scale(1.05)}
.btn-send svg{width:18px;height:18px}
.btn-send:disabled{background:#ccc;cursor:not-allowed;transform:none}
.btn-send svg{width:15px;height:15px}
.btn-send .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
.btn-send.spinning svg{display:none}.btn-send.spinning .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Chat input footer */
.chat-input-footer{display:flex;align-items:center;justify-content:flex-end;gap:8px}
#save-mode-hint{font-size:11px;color:var(--accent);display:none;flex:1}
.save-mode #save-mode-hint{display:inline}
.btn-save-footer{
  font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--text-secondary);
  background:var(--panel-bg);border:1px solid var(--border);border-radius:var(--radius-md);
  cursor:pointer;padding:5px 12px;transition:all 0.2s var(--ease);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.btn-save-footer svg{color:var(--text-tertiary)}
.btn-save-footer:hover{background:var(--bg-hover);color:var(--accent);border-color:var(--accent)}

/* ===================================================================== */
/* Toast                                                                  */
/* ===================================================================== */
#toast-container{
  position:fixed;top:16px;right:16px;z-index:1000;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  padding:12px 18px;border-radius:var(--radius-md);
  background:var(--panel-bg);border:1px solid var(--border);
  box-shadow:var(--shadow-lg);font-size:13px;color:var(--text-primary);
  animation:slideIn 0.3s ease-out;max-width:340px;
  backdrop-filter:blur(20px);
}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green);color:var(--green)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===================================================================== */
/* Settings Modal                                                         */
/* ===================================================================== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.25);z-index:2000;

}
.modal-overlay.open{display:flex}
.modal{

.modal-header{

.modal-close{

  justify-content:center;transition:all 0.2s var(--ease);
}
.modal-close:hover{background:var(--bg-input);color:var(--text-primary)}
.modal-body{padding:16px 20px 20px;display:flex;flex-direction:column;gap:18px}
.setting-group{display:flex;flex-direction:column;gap:6px}
.setting-group label{font-size:12px;font-weight:600;color:var(--text-primary)}
.setting-group .hint{font-size:11px;color:var(--text-secondary);line-height:1.5}
.setting-row{display:flex;align-items:center;justify-content:space-between}
.setting-row span{font-size:13px;color:var(--text-primary)}
input[type=range]{width:100%;accent-color:var(--accent)}
input[type=number]{
  width:64px;padding:5px 8px;font-family:var(--font-ui);font-size:12px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--panel-bg);color:var(--text-primary);outline:none;text-align:center;
}
input[type=number]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)}
input[type=text].setting-path{
  width:100%;padding:8px 12px;font-family:var(--font-ui);font-size:12px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--panel-bg);color:var(--text-primary);outline:none;
}
input[type=text].setting-path:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)}
textarea.setting-prompt{
  width:100%;padding:8px 12px;font-family:var(--font-ui);font-size:12px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--panel-bg);color:var(--text-primary);outline:none;
  resize:vertical;line-height:1.5;
}
textarea.setting-prompt:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)}

/* Toggle switch */
.toggle-sw{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-sw input{display:none}
.toggle-sw .track{
  position:absolute;inset:0;background:#d1d1d6;
  border-radius:12px;cursor:pointer;transition:background 0.2s;
}
.toggle-sw input:checked+.track{background:var(--accent)}
.toggle-sw .track::after{
  content:'';position:absolute;top:2px;left:2px;
  width:20px;height:20px;background:#fff;border-radius:50%;
  transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.12);
}
.toggle-sw input:checked+.track::after{transform:translateX(18px)}

.btn-restore{
  font-family:var(--font-ui);font-size:12px;font-weight:500;
  color:var(--text-secondary);background:none;
  border:1px solid var(--border);border-radius:var(--radius-sm);

}

/* Confirm dialog */

<script>
// ======================================================================
// A. CONSTANTS & CONFIG
// ======================================================================
const API_BASE = 'http://localhost:8765';

// 前端错误上报
window.onerror = function(msg, src, line, col, err) {
  try {
    var stack = (err && err.stack) ? String(err.stack) : '';
    fetch(API_BASE + '/api/log-error', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: String(msg), source: String(src || ''), lineno: line || 0, colno: col || 0, stack: stack})
    });
  } catch(e) {}
  console.error('JS Error:', msg, src, line, col, stack);
};
// ======================================================================
const FONT_MIN = 14, FONT_MAX = 22, FONT_DEFAULT = 16;
const DEFAULT_CONTEXT_LIMIT = 48000;
const MAX_HISTORY = 10;
const CHAPTER_WARN_LIMIT = 40000;
const DEFAULT_VAULT_PATH = 'Inbox/Epub阅读/';
const DEFAULT_SYSTEM_PROMPT = '你是博学的阅读助手。以下是《{book_name}》中用户选中的章节原文。优先基于原文内容回答并引用原文。如果问题超出原文范围，可以结合你的知识回答，但要明确区分原文信息和你自己的知识。不知道就说不知道，不要编造信息。';

// ======================================================================
// B. GLOBAL STATE
// ======================================================================
let chapters = [];               // {title, text, text_cn, tokens_approx}
let bookName = '';
let repairLevel = 0;
let selectedChapters = new Set(); // indices
let chapterTokens = 0;
let customSystemPrompt = '';     // 用户自定义系统提示词，空字符串=使用默认
let conversationTokens = 0;
let conversationHistory = [];    // [{role, content}]
let contextLimit = DEFAULT_CONTEXT_LIMIT;
let contextLimitByModel = {};     // 按模型记住上下文设置: { 'ollama:xxx': 48000, 'deepseek:xxx': 128000 }
let chineseOnly = true;
let currentModel = '';
let ollamaModels = [];
let webSearchEnabled = false;
let saveMode = false;
let vaultPath = DEFAULT_VAULT_PATH;
let activeAbortController = null;
let isStreaming = false;
let globalFontSize = FONT_DEFAULT;
let msgIdCounter = 0;
let prevOllamaModel = '';
let warning40kDismissed = false;
let warning85Dismissed = false;
let recalcTimer = null;  // debounce timer for recalcChapterTokens

// ======================================================================
// C. UTILITY FUNCTIONS
// ======================================================================
function toast(msg, type = 'info', duration = 1500) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + (type === 'info' ? '' : type);
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function formatDate(isoString) {
  const d = new Date(isoString);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const dDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const time = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (dDay.getTime() === today.getTime()) return '今天 ' + time;
  if (dDay.getTime() === yesterday.getTime()) return '昨天 ' + time;
  return (d.getMonth() + 1) + '-' + d.getDate() + ' ' + time;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function getDisplayText(chapter) {
  return chineseOnly ? chapter.text_cn : chapter.text;
}

// ======================================================================
// D. API LAYER
// ======================================================================
async function apiLoadOllamaModels() {
  try {
    const resp = await fetch(API_BASE + '/api/ollama-models');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    ollamaModels = data.models || [];
    return ollamaModels;
  } catch (err) {
    console.warn('Ollama 模型列表获取失败:', err);
    return [];
  }
}

async function apiUploadEpub(file) {
  const form = new FormData();
  form.append('file', file);
  const resp = await fetch(API_BASE + '/api/load-epub', { method: 'POST', body: form });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || '上传失败 (HTTP ' + resp.status + ')');
  }
  return await resp.json();
}

async function apiCountTokens(text, model) {
  try {
    const resp = await fetch(API_BASE + '/api/count-tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model }),
      signal: AbortSignal.timeout(10000)
    });
    if (!resp.ok) return 0;
    const data = await resp.json();
    return data.tokens || 0;
  } catch (e) { return 0; }
}

async function apiCountTokensBatch(texts, model) {
  if (!texts || texts.length === 0) return [];
  try {
    const resp = await fetch(API_BASE + '/api/count-tokens-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texts, model }),
      signal: AbortSignal.timeout(15000)
    });
    if (!resp.ok) throw new Error('批量 token 计算失败');
    const data = await resp.json();
    return data.tokens || [];
  } catch (e) {
    // fallback: use approximate tokens
    return texts.map(t => 0);
  }
}

async function apiSaveObsidian(bookName, messages) {
  const resp = await fetch(API_BASE + '/api/save-obsidian', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ book_name: bookName, messages })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail || err.error || '保存失败');
  }
  return await resp.json();
}

async function apiSearchDuckDuckGo(query) {
  try {
    const resp = await fetch(
      'https://api.duckduckgo.com/?q=' + encodeURIComponent(query) + '&format=json&no_html=1&skip_disambig=1',
      { signal: AbortSignal.timeout(8000) }
    );
    const data = await resp.json();
    const results = [];
    if (data.AbstractText) {
      results.push({ title: data.Heading || '摘要', snippet: data.AbstractText, url: data.AbstractURL });
    }
    for (const topic of (data.RelatedTopics || [])) {
      if (topic.Text && topic.FirstURL) {
        results.push({ title: topic.Text.split(' - ')[0], snippet: topic.Text, url: topic.FirstURL });
      }
    }
    return results.slice(0, 5);
  } catch (err) {
    console.warn('联网搜索失败:', err);
    return [];
  }
}

// SSE Stream handler with cross-chunk buffer
function apiChatStream(body, { onToken, onTokensUsed, onDone, onError }) {
  const controller = new AbortController();
  activeAbortController = controller;
  // manual timeout — avoids AbortSignal.any() compat issues
  const timeoutId = setTimeout(() => { controller.abort(); onError('请求超时（5分钟）'); }, 300000);

  (async () => {
    try {
      console.log('apiChatStream: sending request to', API_BASE + '/api/chat', 'model:', body.model);
      const resp = await fetch(API_BASE + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        console.error('apiChatStream: HTTP error', resp.status, err);
        onError(err.error || err.detail || '对话请求失败 (HTTP ' + resp.status + ')');
        return;
      }

      console.log('apiChatStream: response OK, starting to read stream');
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = ''; // cross-chunk line buffer

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') { onDone(); return; }
          try {
            const data = JSON.parse(payload);
            if (data.content) onToken(data.content);
            if (data.tokens_used !== undefined) onTokensUsed(data.tokens_used);
            if (data.error) onError(data.error);
          } catch (e) { /* skip non-JSON lines */ }
        }
      }
      // flush remaining buffer
      if (buffer.startsWith('data: ')) {
        const payload = buffer.slice(6);
        if (payload !== '[DONE]') {
          try {
            const data = JSON.parse(payload);
            if (data.content) onToken(data.content);
            if (data.tokens_used !== undefined) onTokensUsed(data.tokens_used);
          } catch (e) { /* skip */ }
        }
      }
      onDone();
    } catch (err) {
      clearTimeout(timeoutId);
      if (err.name === 'AbortError') return;
      onError('网络连接失败，请检查服务是否运行');
    }
  })();

  return controller;
}

function saveHistory() {
  const data = (loadHistory() || []).filter(h => h.name !== bookName);
  if (bookName && chapters.length > 0) {
    data.unshift({
      name: bookName,
      chapters: chapters.map(c => ({ title: c.title })),
      totalChapters: chapters.length,
      lastOpened: new Date().toISOString()
    });
  }
  const trimmed = data.slice(0, MAX_HISTORY);
  try { localStorage.setItem('epub-reader-history', JSON.stringify(trimmed)); } catch (e) {}
  return trimmed;
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('epub-reader-history')) || []; } catch (e) { return []; }
}

function removeFromHistory(name) {
  let data = loadHistory().filter(h => h.name !== name);
  try { localStorage.setItem('epub-reader-history', JSON.stringify(data)); } catch (e) {}
  renderHistoryList();
}

function clearHistory() {
  try { localStorage.removeItem('epub-reader-history'); } catch (e) {}
  renderHistoryList();
}

function saveSettings() {
  // 保存前把当前模型的上下文记录到 map 中
  if (currentModel) {
    contextLimitByModel[currentModel] = contextLimit;
  }
  try {
    localStorage.setItem('epub-reader-settings', JSON.stringify({
      contextLimit, chineseOnly, vaultPath, customSystemPrompt, contextLimitByModel
    }));
  } catch (e) {}
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('epub-reader-settings'));
    if (s) {
      contextLimit = s.contextLimit || DEFAULT_CONTEXT_LIMIT;
      chineseOnly = s.chineseOnly !== undefined ? s.chineseOnly : true;
      vaultPath = s.vaultPath || DEFAULT_VAULT_PATH;
      customSystemPrompt = s.customSystemPrompt || '';
      contextLimitByModel = s.contextLimitByModel || {};
    }
  } catch (e) {}
  // 如果保存的上下文超过当前模型上限，自动 clamp
  const maxCtx = getContextMax();
  if (contextLimit > maxCtx) {
    contextLimit = maxCtx;
  }
}

function applySettingsToForm() {
  const maxCtx = getContextMax();
  const sl = $('#ctx-slider'), nu = $('#ctx-number'), cu = $('#ctx-current');
  const co = $('#chinese-only'), vp = $('#vault-path'), sp = $('#system-prompt');
  if (sl) { sl.max = maxCtx; sl.value = contextLimit; }
  if (nu) { nu.max = maxCtx; nu.value = contextLimit; }
  if (cu) cu.textContent = contextLimit;
  if (co) co.checked = chineseOnly;
  if (vp) vp.value = vaultPath;
  if (sp) sp.value = customSystemPrompt;
}

function saveConversation() {
  try {
    localStorage.setItem('epub-reader-conversation', JSON.stringify(
      conversationHistory.slice(-20)
    ));

}

function loadConversation() {

function renderHistoryList() {
  const list = $('#history-list');
  const data = loadHistory();
  if (data.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary);padding:8px">暂无记录</div>';
    return;
  }
  list.innerHTML = data.map((h, i) =>
    '<div class="history-item' + (h.name === bookName ? ' active' : '') + '" data-idx="' + i + '">' +
    '<div class="book-info"><div class="book-name">' + escapeHtml(h.name) + '</div>' +
    '<div class="book-meta">' + h.totalChapters + '章 · ' + formatDate(h.lastOpened) + '</div></div>' +
    '<button class="btn-delete" data-name="' + escapeHtml(h.name) + '">✕</button></div>'
  ).join('');

  // click handlers
  list.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', function(e) {
      if (e.target.closest('.btn-delete')) return;
      const name = this.querySelector('.book-name').textContent;
      loadFromHistory(name);
    });
  });

    btn.addEventListener('click', function(e) {

      removeFromHistory(this.dataset.name);

function renderChapterList(filterQuery = '') {
  const container = $('#chapter-list');
  const selectAllRow = $('#select-all-row');
  const q = (filterQuery || '').toLowerCase();

  if (chapters.length === 0) {
    container.innerHTML = '';
    selectAllRow.style.display = 'none';
    return;
  }

  selectAllRow.style.display = 'flex';

  let html = '';
  let visible = 0;
  let visibleSelected = 0;
  chapters.forEach((ch, i) => {
    const match = !q || ch.title.toLowerCase().includes(q) || (ch.text || '').toLowerCase().includes(q) || (ch.text_cn || '').toLowerCase().includes(q);
    if (!match) return;
    visible++;
    if (selectedChapters.has(i)) visibleSelected++;
    const checked = selectedChapters.has(i);
    const tokens = ch.tokens !== undefined ? ch.tokens : (ch.tokens_approx || 0);
    html += '<div class="chapter-item" data-idx="' + i + '">' +
      '<span class="ch-indicator"><span class="ch-dot"></span></span>' +
      '<input type="checkbox" data-idx="' + i + '" ' + (checked ? 'checked' : '') + '>' +
      '<span class="chapter-title chapter-jump" data-idx="' + i + '">' + escapeHtml(ch.title) + '</span>' +
      '<span class="chapter-meta">' + formatTokens(tokens) + '</span>' +
      '</div>';
  });

  if (visible === 0 && q) {
    html = '<div class="no-results">无匹配章节</div>';
  }

  // 章节计数提示
  if (chapters.length > 0) {
    html += '<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:8px 0">共 ' + chapters.length + ' 章' + (q ? '，匹配 ' + visible + ' 章' : '，已选 ' + selectedChapters.size + ' 章') + '</div>';
  }

  container.innerHTML = html;

  // bind checkbox events — toggle selection only
  container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.idx);
      handleChapterToggle(idx, this.checked);
    });
  });

  // bind title click — jump to chapter in reader (no selection change)
  container.querySelectorAll('.chapter-jump').forEach(title => {
    title.addEventListener('click', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.idx);
      scrollToChapter(idx);
    });
  });

  // bind indicator click — same as checkbox toggle
  container.querySelectorAll('.ch-indicator').forEach(ind => {
    ind.addEventListener('click', function(e) {
      e.stopPropagation();
      const cb = this.parentElement.querySelector('input[type="checkbox"]');
      if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
    });
  });

  // sync select-all checkbox state
  syncSelectAllCheckbox(visible, visibleSelected);
}

function syncSelectAllCheckbox(visible, visibleSelected) {
  const cb = $('#select-all-checkbox');
  if (!cb) return;
  if (visible === 0) {
    cb.checked = false;
    cb.indeterminate = false;
  } else if (visibleSelected === 0) {
    cb.checked = false;
    cb.indeterminate = false;
  } else if (visibleSelected >= visible) {
    cb.checked = true;
    cb.indeterminate = false;
  } else {
    cb.checked = false;
    cb.indeterminate = true;
  }
}

function updateChapterTokenDisplay() {
  $('#chapter-list').querySelectorAll('.chapter-item').forEach(item => {
    const cb = item.querySelector('input[type="checkbox"]');

    const idx = parseInt(cb.dataset.idx);

function updateSummaryBar() {

function highlightText(text, query) {
  if (!query) return text;
  // escape regex special chars in query
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="search-highlight">$1</span>');
}

function renderReaderArea() {
  const container = $('#reader-content');
  const empty = $('#reader-empty');
  const query = ($('#chapter-search').value || '').trim();

  // Only show empty state when no book is loaded at all
  if (chapters.length === 0) {
    container.innerHTML = '';
    const emptyEl = document.createElement('div');
    emptyEl.className = 'empty-state';
    emptyEl.id = 'reader-empty';
    emptyEl.innerHTML = '';
    container.appendChild(emptyEl);
    return;
  }

  // 移除旧的 empty state（如果存在）
  if (empty) empty.remove();

  // Remember which chapter was visible before re-render
  const prevSection = container.querySelector('.reader-chapter-section');
  let prevIdx = -1;
  if (prevSection) {
    const sections = container.querySelectorAll('.reader-chapter-section');
    let bestIdx = -1;
    sections.forEach(s => {
      if (s.offsetTop - container.offsetTop <= container.scrollTop + 10) {
        bestIdx = parseInt(s.dataset.chapterIdx);
      }
    });
    prevIdx = bestIdx;
  }

  // Render ALL chapters — selection only affects AI context, not reading
  let html = '';
  chapters.forEach((ch, idx) => {
    if (idx > 0) html += '<div class="reader-chapter-divider">───</div>';
    html += '<div class="reader-chapter-section" data-chapter-idx="' + idx + '">';
    html += '<span class="reader-chapter-title">' + highlightText(escapeHtml(ch.title), query) + '</span>';
    const text = getDisplayText(ch);
    const paragraphs = text.split('\n').filter(p => p.trim());
    paragraphs.forEach(p => {
      html += '<p>' + highlightText(escapeHtml(p), query) + '</p>';
    });
    html += '</div>';
  });

  container.innerHTML = html;

  // Scroll to last visible chapter, not to top
  if (prevIdx >= 0 && prevIdx < chapters.length) {
    const target = container.querySelector('[data-chapter-idx="' + prevIdx + '"]');
    if (target) {
      container.scrollTop = target.offsetTop - container.offsetTop;
    } else {
      container.scrollTop = 0;
    }
  } else {
    container.scrollTop = 0;
  }
  updateReaderChapterNav();
}

function addMessage(role, content, msgId) {
  const container = $('#chat-messages');
  const empty = $('#chat-empty');
  if (empty) empty.style.display = 'none';

  if (!msgId) msgId = 'msg-' + (++msgIdCounter);

  if (role === 'system') {
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.id = msgId;
    el.textContent = content;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return msgId;
  }

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  row.id = msgId;

  // save mode checkbox
  const sel = document.createElement('label');
  sel.className = 'msg-sel';
  sel.innerHTML = '<input type="checkbox" data-msg="' + msgId + '"><span class="cb-box"></span>';
  row.appendChild(sel);

  // bubble
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant' && typeof marked !== 'undefined') {
    bubble.innerHTML = marked.parse(content);
  } else {
    bubble.innerHTML = content.replace(/\n/g, '<br>');
  }
  row.appendChild(bubble);

  // toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'msg-toolbar';
  // copy button
  toolbar.innerHTML =
    '<button class="toolbar-btn btn-copy" title="复制" data-msg="' + msgId + '">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
    '</button>';
  // save button (AI messages only)
  if (role === 'assistant') {
    toolbar.innerHTML +=
      '<button class="toolbar-btn btn-save-single" title="保存到 Obsidian" data-msg="' + msgId + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
      '</button>';
  }
  bubble.appendChild(toolbar);

  // toolbar events
  row.querySelector('.btn-copy').addEventListener('click', function(e) {
    e.stopPropagation();
    copyMessage(msgId, this);
  });
  const saveBtn = row.querySelector('.btn-save-single');
  if (saveBtn) {
    saveBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      saveSingleMessage(msgId, this);
    });
  }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
  return msgId;
}

function updateMessageContent(msgId, content, isMarkdown = false) {

function updateContextBar() {
  const total = chapterTokens + conversationTokens;
  const pct = contextLimit > 0 ? Math.min(100, (total / contextLimit) * 100) : 0;
  const fill = $('#progress-fill');
  const pctEl = $('#progress-pct');

  fill.style.width = Math.max(pct, 0.5) + '%';

  // 小百分比显示一位小数，避免 0.1% → 0% 的误解
  pctEl.textContent = pct > 0 && pct < 1 ? pct.toFixed(1) + '%' : Math.round(pct) + '%';

  updateSendButtonState();

function getContextColor(pct) {

  if (pct >= 80) return 'red';
  if (pct >= 60) return 'yellow';
  return 'green';
}

function updateWarningBar() {
  const bar40k = $('#warning-40k');

  } else {
    bar40k.style.display = 'none';

  } else {

}

function updateSendButtonState() {

// ======================================================================
async function recalcChapterTokens() {
  if (selectedChapters.size === 0) {
    chapterTokens = 0;
    updateSummaryBar();
    updateContextBar();
    updateWarningBar();
    return;
  }
  const selected = [...selectedChapters].sort((a, b) => a - b);
  const texts = selected.map(idx => getDisplayText(chapters[idx]));
  try {
    const tokens = await apiCountTokensBatch(texts, currentModel);
    // update stored tokens for each selected chapter
    selected.forEach((idx, i) => {
      chapters[idx].tokens = tokens[i] || chapters[idx].tokens_approx;
    });
    chapterTokens = tokens.reduce((a, b) => a + b, 0);
    updateChapterTokenDisplay();
  } catch (err) {
    // fallback: use tokens_approx
    chapterTokens = selected.reduce((sum, idx) => sum + (chapters[idx].tokens_approx || 0), 0);
    console.warn('批量 token 计算失败，使用近似值:', err);
  }
  updateSummaryBar();
  updateContextBar();
  updateWarningBar();
}

// 防抖版本：快速连续切换章节时只触发最后一次
function recalcChapterTokensDebounced(delay = 400) {
  if (recalcTimer) clearTimeout(recalcTimer);
  recalcTimer = setTimeout(() => {
    recalcTimer = null;
    recalcChapterTokens();
  }, delay);
}

function handleChapterToggle(idx, checked) {
  if (checked) {
    selectedChapters.add(idx);
  } else {
    selectedChapters.delete(idx);
  }

  const approxTokens = [...selectedChapters].reduce((sum, i) => sum + (chapters[i].tokens_approx || 0), 0);
  chapterTokens = approxTokens;
  updateSummaryBar();
  updateContextBar();
  updateWarningBar();

  // 异步精确计算
  recalcChapterTokensDebounced();

  // sync select-all checkbox state
  syncSelectAllAfterToggle();
}

// 章节勾选变化后同步全选框状态（不重新渲染整个列表）
function syncSelectAllAfterToggle() {
  const q = ($('#chapter-search').value || '').toLowerCase();
  let visible = 0, visibleSelected = 0;
  chapters.forEach((ch, i) => {
    const match = !q || ch.title.toLowerCase().includes(q) || (ch.text || '').toLowerCase().includes(q) || (ch.text_cn || '').toLowerCase().includes(q);
    if (match) {
      visible++;
      if (selectedChapters.has(i)) visibleSelected++;
    }
  });
  syncSelectAllCheckbox(visible, visibleSelected);
}

async function sendMessage() {
  console.log('sendMessage called, isStreaming:', isStreaming, 'currentModel:', currentModel, 'selectedChapters:', selectedChapters.size);
  if (isStreaming) {
    // stop streaming
    if (activeAbortController) {
      activeAbortController.abort();
      activeAbortController = null;
    }
    isStreaming = false;
    updateSendButtonState();
    return;
  }

  const textarea = $('#chat-input');
  const question = textarea.value.trim();
  if (!question) return;
  if (selectedChapters.size === 0) {
    toast('请先在左侧选择要阅读的章节');
    return;
  }

  const total = chapterTokens + conversationTokens;
  if (total > contextLimit) {
    // 警告但不阻塞——后端会自动截断章节内容以适应上下文窗口
    toast('⚠️ 上下文超出限制，章节内容将被自动截断', 'error', 3000);
  }

  // abort previous stream
  if (activeAbortController) {
    activeAbortController.abort();
    activeAbortController = null;
  }

  isStreaming = true;
  textarea.value = '';
  textarea.style.height = 'auto';
  updateSendButtonState();

  // 安全超时：5分钟后强制重置 streaming 状态
  const streamTimeout = setTimeout(() => {
    if (isStreaming) {
      isStreaming = false;
      if (activeAbortController) {
        activeAbortController.abort();
        activeAbortController = null;
      }
      updateSendButtonState();
      console.warn('流式超时保护触发');
    }
  }, 300000);

  // add user message
  const userMsgId = addMessage('user', question);
  conversationHistory.push({ role: 'user', content: question });

  // add empty AI message for streaming
  const aiMsgId = addMessage('assistant', '');
  const aiRow = document.getElementById(aiMsgId);
  if (aiRow) aiRow.classList.add('streaming');
  let aiContent = '';
  let tokensUsed = 0;

  // web search (if enabled + DeepSeek)
  let searchResults = [];
  if (webSearchEnabled && currentModel.startsWith('deepseek')) {
    showThinking('正在搜索...');
    searchResults = await apiSearchDuckDuckGo(question);
    hideThinking();
    // no results: silently skip, don't clutter the chat
  }

  // build messages
  const selected = [...selectedChapters].sort((a, b) => a - b);
  const chapterText = selected.map(idx => {
    const ch = chapters[idx];
    return '## ' + ch.title + '\n\n' + getDisplayText(ch);
  }).join('\n\n---\n\n');

  let augmentedQuestion = question;
  if (searchResults.length > 0) {
    const ctx = searchResults.map((r, i) =>
      '[搜索结果 ' + (i + 1) + ']\n标题: ' + r.title + '\n来源: ' + r.url + '\n内容: ' + r.snippet
    ).join('\n\n');
    augmentedQuestion =
      '以下是与问题相关的网络搜索结果，请结合这些信息和《' + bookName + '》原文回答：\n\n' +
      ctx + '\n\n---\n用户问题: ' + question +
      '\n\n要求: 优先使用原文内容回答。如果原文信息不足，再参考搜索结果。引用搜索结果时需注明来源。';
  }

  const messages = [
    { role: 'system', content: '你是博学的阅读助手。以下是《' + bookName + '》中用户选中的章节原文。优先基于原文内容回答并引用原文。如果问题超出原文范围，可以结合你的知识回答，但要明确区分原文信息和你自己的知识。不知道就说不知道，不要编造信息。\n\n' + chapterText },
    ...conversationHistory.slice(0, -1), // exclude the user message we just added
    { role: 'user', content: augmentedQuestion }
  ];

  const body = {
    model: currentModel,
    chapters_text: chapterText,
    book_name: bookName,
    history: conversationHistory.slice(0, -1),
    question: augmentedQuestion,
    context_limit: contextLimit,
    system_prompt: customSystemPrompt || ''
  };

  apiChatStream(body, {
    onToken(content) {
      aiContent += content;
      updateMessageContent(aiMsgId, aiContent, false);
      if (aiContent.length < 20) console.log('apiChatStream: first token received:', content);
    },
    onTokensUsed(tokens) {
      tokensUsed = tokens;
    },
    onDone() {
      clearTimeout(streamTimeout);
      // render final markdown
      updateMessageContent(aiMsgId, aiContent, true);
      if (aiRow) aiRow.classList.remove('streaming');
      conversationHistory.push({ role: 'assistant', content: aiContent });
      conversationTokens += tokensUsed;
      isStreaming = false;
      activeAbortController = null;
      updateContextBar();
      updateWarningBar();
      updateSendButtonState();
      saveConversation();
      checkContextAndHandle();
    },
    onError(msg) {
      clearTimeout(streamTimeout);
      updateMessageContent(aiMsgId, '⚠️ ' + msg, false);
      if (aiRow) aiRow.classList.remove('streaming');
      isStreaming = false;
      activeAbortController = null;
      updateSendButtonState();
      toast(msg, 'error');
    }
  });
}

function checkContextAndHandle() {
  const total = chapterTokens + conversationTokens;
  const pct = contextLimit > 0 ? (total / contextLimit) : 0;
  if (pct >= 0.85) {
    warning85Dismissed = false;
  }
  updateWarningBar();
}

function getContextMax() {
  // DeepSeek 全系支持 128K
  if (currentModel.startsWith('deepseek:')) return 128000;
  return 48000;
}

function updateContextSliderMax() {
  const maxCtx = getContextMax();
  const slider = $('#ctx-slider');
  const number = $('#ctx-number');
  slider.max = maxCtx;
  number.max = maxCtx;
  // clamp：当前上下文不能超过模型上限
  if (contextLimit > maxCtx) {
    contextLimit = maxCtx;
    saveSettings();
  }
  // 始终同步滑条显示 + 刷新按钮状态
  slider.value = contextLimit;
  number.value = contextLimit;
  $('#ctx-current').textContent = contextLimit;
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();
}

async function handleModelChange(newModel) {
  if (currentModel === newModel) return;

  // 中止当前流式输出（防止 Ollama 大上下文挂起阻塞）
  if (activeAbortController) {
    activeAbortController.abort();
    activeAbortController = null;
  }
  if (isStreaming) {
    isStreaming = false;
    updateSendButtonState();
    hideThinking();
    document.querySelectorAll('.msg-row.streaming').forEach(r => r.classList.remove('streaming'));
  }

  // 保存当前模型的上下文设置
  if (currentModel) {
    contextLimitByModel[currentModel] = contextLimit;
  }

  if (newModel.startsWith('deepseek')) {
    if (currentModel.startsWith('ollama:')) prevOllamaModel = currentModel;
    webSearchEnabled = true;
  } else if (newModel.startsWith('ollama:')) {
    webSearchEnabled = false;
  }

  currentModel = newModel;

  // Sync chat badges + avatar person color
  const cbl = $('#chat-badge-local'), cbc = $('#chat-badge-cloud');
  const avatar = $('#ai-avatar');
  if (cbl && cbc) {
    if (newModel.startsWith('ollama:')) {
      cbl.classList.add('active'); cbc.classList.remove('active');
      if (avatar) avatar.querySelector('svg').setAttribute('stroke', '#fff');
    } else {
      cbc.classList.add('active'); cbl.classList.remove('active');
      if (avatar) avatar.querySelector('svg').setAttribute('stroke', '#e8943a');
    }
  }

  // 恢复新模型的上下文设置（如果之前保存过），否则使用默认上限
  if (contextLimitByModel[newModel]) {
    contextLimit = contextLimitByModel[newModel];
  } else {
    contextLimit = getContextMax();
  }

  // 更新滑条上限（clamp 当前值如果需要）+ 刷新按钮状态
  updateContextSliderMax();

  updateStatusBar();

  // 立即刷新上下文进度条和发送按钮（使用当前 chapterTokens + 新 contextLimit）
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();

  // recalculate tokens with new tokenizer (fire-and-forget, 不阻塞切换)
  if (chapters.length > 0) {
    recalcChapterTokens().catch(() => {});
  }
}

async function loadFromHistory(name) {
  // Try to load from backend cache (内存 → 磁盘缓存 → 本地 EPUB 重解析)
  try {
    const resp = await fetch(API_BASE + '/api/load-epub', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ book_name: name, from_cache: true })
    });
    if (resp.ok) {
      const data = await resp.json();
      applyBookData(data);
      return;
    }
  } catch (e) {}

  // 所有恢复方式都失败，需要重新上传
  toast('《' + name + '》需要重新上传 EPUB 文件', 'error');
}

async function handleFileSelected(file) {
  if (!file) return;
  if (conversationHistory.length > 0) {
    showConfirmDialog('加载新书将清空当前对话，是否继续？', async () => {
      await doUpload(file);

async function doUpload(file) {
  const btn = $('#btn-upload');
  btn.disabled = true;
  btn.textContent = '加载中...';

  try {
    const data = await apiUploadEpub(file);
    applyBookData(data);

    // handle repair level toasts
    if (data.repair_level === 1) {
      toast('EPUB 目录结构已自动修复，章节顺序可能与原书略有差异');
    } else if (data.repair_level === 2) {
      toast('EPUB 文件存在损坏，已尽力修复并提取可读内容');
    } else if (data.repair_level === 3) {
      toast('⚠️ EPUB 严重损坏，已使用原始模式提取文本片段，无章节结构', 'error');
    }
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '打开 EPUB';
  }
}

function copyMessage(msgId, btn) {
  const row = document.getElementById(msgId);
  if (!row) return;
  const bubble = row.querySelector('.msg-bubble');
  const text = bubble ? bubble.textContent : '';
  const origHTML = btn.innerHTML;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;stroke:currentColor"><polyline points="20 6 9 17 4 12"/></svg>';
      btn.classList.add('done');
      toast('已复制到剪贴板');
      setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('done'); }, 1500);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('已复制到剪贴板'); } catch (e) { toast('复制失败', 'error'); }
    document.body.removeChild(ta);
  }
}

async function saveSingleMessage(msgId, btn) {

    toast(err.message, 'error');
  }
}

    }, 400);

function showConfirmDialog(msg, onConfirm) {
  const dialog = $('#confirm-dialog');
  $('#confirm-msg').textContent = msg;
  dialog.classList.add('open');

  const okBtn = $('#confirm-ok');
  const cancelBtn = $('#confirm-cancel');

  const cleanup = () => {
    dialog.classList.remove('open');
    okBtn.removeEventListener('click', handler);
    cancelBtn.removeEventListener('click', cleanup);
  };

  function handler() {
    cleanup();
    if (onConfirm) onConfirm();
  }

  okBtn.addEventListener('click', handler);
  cancelBtn.addEventListener('click', cleanup);
}

function setupSettingsPanel() {
  const slider = $('#ctx-slider');
  const number = $('#ctx-number');
  const current = $('#ctx-current');
  if (!slider || !number || !current) return;

  slider.addEventListener('input', () => {
    number.value = slider.value;
    current.textContent = slider.value;
    contextLimit = parseInt(slider.value);
    saveSettings();
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
  });

  number.addEventListener('input', () => {
    let val = parseInt(number.value) || DEFAULT_CONTEXT_LIMIT;
    const maxCtx = getContextMax();
    val = clamp(val, 8000, maxCtx);
    slider.value = val;
    number.value = val;
    current.textContent = val;
    contextLimit = val;
    saveSettings();
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
  });

  // chinese only toggle
  const co = $('#chinese-only');
  if (co) co.addEventListener('change', function() {
    chineseOnly = this.checked; saveSettings(); renderReaderArea(); recalcChapterTokens();
    toast(chineseOnly ? '已切换为仅中文' : '已切换为显示全文');
  });

  const vp = $('#vault-path');
  if (vp) vp.addEventListener('change', function() { vaultPath = this.value || DEFAULT_VAULT_PATH; saveSettings(); });

  const sp = $('#system-prompt');
  if (sp) sp.addEventListener('change', function() { customSystemPrompt = this.value; saveSettings(); });

  const br = $('#btn-restore');
  if (br) br.addEventListener('click', () => {
    contextLimit = DEFAULT_CONTEXT_LIMIT;
    chineseOnly = true;
    vaultPath = DEFAULT_VAULT_PATH;
    customSystemPrompt = '';
    applySettingsToForm();
    saveSettings();
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
    renderReaderArea();
    toast('已恢复默认设置');
  });

  // modal open/close
  const bs = $('#btn-settings'), mc = $('#modal-close'), sm = $('#settings-modal');
  if (bs) bs.addEventListener('click', () => { applySettingsToForm(); sm.classList.add('open'); });
  if (mc) mc.addEventListener('click', () => sm.classList.remove('open'));
  if (sm) sm.addEventListener('click', e => { if (e.target === sm) sm.classList.remove('open'); });
}

// J. COLUMN DIVIDER SETUP
// ======================================================================
function setupDivider(did, lid, rid) {
  const d = document.getElementById(did), l = document.getElementById(lid), r = document.getElementById(rid);
  if (!d || !l || !r) return;
  let down, sx, sl, sr;

  // restore saved widths (skip invalid values from corrupted storage)
  const savedLW = localStorage.getItem('col-width-' + lid);
  const savedRW = localStorage.getItem('col-width-' + rid);
  if (savedLW && !isNaN(parseInt(savedLW))) l.style.width = savedLW + 'px';
  if (savedRW && !isNaN(parseInt(savedRW))) r.style.width = savedRW + 'px';

  d.addEventListener('mousedown', e => {
    e.preventDefault();
    down = true; d.classList.add('dragging');
    document.body.classList.add('drag-resizing');
    sx = e.clientX; sl = l.getBoundingClientRect().width; sr = r.getBoundingClientRect().width;
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!down) return;
    const dx = e.clientX - sx, nl = sl + dx, nr = sr - dx;
    const lmin = lid === 'sidebar' ? 180 : 250, rmin = rid === 'reader' ? 250 : 300;
    if (nl >= lmin && nr >= rmin) { l.style.width = nl + 'px'; r.style.width = nr + 'px'; }
  });
  document.addEventListener('mouseup', () => {
    if (!down) return; down = false;
    d.classList.remove('dragging');
    document.body.classList.remove('drag-resizing');
    document.body.style.cursor = '';
    // save widths
    localStorage.setItem('col-width-' + lid, parseInt(l.style.width));
    localStorage.setItem('col-width-' + rid, parseInt(r.style.width));
  });
}

// ======================================================================
async function init() {
  // 1. Load settings from localStorage
  loadSettings();
  applySettingsToForm();

  // 2. Restore font size
  globalFontSize = parseInt(localStorage.getItem('readerFontSize')) || FONT_DEFAULT;
  applyFontSize(globalFontSize);

  // 3. Load history
  renderHistoryList();

  // 4. Load Ollama models
  const models = await apiLoadOllamaModels();
  const select = $('#model-select');
  select.innerHTML = '';

  if (models.length > 0) {
    const ollamaGroup = document.createElement('optgroup');
    ollamaGroup.label = '本地 Ollama';
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = 'ollama:' + m.name;
      opt.textContent = m.name;
      ollamaGroup.appendChild(opt);
    });
    select.appendChild(ollamaGroup);
    currentModel = 'ollama:' + models[0].name;
    // 恢复该模型的上下文设置
    if (contextLimitByModel[currentModel]) {
      contextLimit = contextLimitByModel[currentModel];
    }
    // update ollama default display
    $('#ctx-ollama-default').textContent = models[0].context_length || 32768;
  } else {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'Ollama 未运行';
    opt.disabled = true;
    select.appendChild(opt);
    toast('⚠️ Ollama 未运行，请先执行 ollama serve', 'error');
  }

  // DeepSeek options
  const dsGroup = document.createElement('optgroup');
  dsGroup.label = 'DeepSeek (云端)';
  ['deepseek-v4-flash'].forEach(name => {
    const opt = document.createElement('option');
    opt.value = 'deepseek:' + name;
    opt.textContent = name;
    dsGroup.appendChild(opt);
  });
  select.appendChild(dsGroup);

  if (currentModel) {
    select.value = currentModel;
  }

  // 5. Model change handler
  select.addEventListener('change', function() {
    handleModelChange(this.value);
  });

  // 5b. Badge click handlers — chat badge group (now the only one)
  const cbl = $('#chat-badge-local'), cbc = $('#chat-badge-cloud');
  if (cbl) cbl.addEventListener('click', function() {
    if (this.classList.contains('active')) return;
    const firstLocal = select.querySelector('optgroup[label="本地 Ollama"] option');
    if (firstLocal) { select.value = firstLocal.value; handleModelChange(firstLocal.value); }
  });
  if (cbc) cbc.addEventListener('click', function() {
    if (this.classList.contains('active')) return;
    const firstCloud = select.querySelector('optgroup[label="DeepSeek (云端)"] option');
    if (firstCloud) { select.value = firstCloud.value; handleModelChange(firstCloud.value); }
  });

  // 6. Update status bar
  updateStatusBar();

  // 7. Set up column dividers
  setupDivider('divider-1', 'sidebar', 'reader');
  setupDivider('divider-2', 'reader', 'chat');

  // 8. Load conversation from localStorage
  const savedConv = loadConversation();
  if (savedConv.length > 0) {
    conversationHistory = savedConv;
    renderConversation(savedConv);
    // calculate conversation tokens
    const allText = savedConv.map(m => m.content).join('\n');
    apiCountTokens(allText, currentModel).then(t => {
      conversationTokens = t;
      updateContextBar();
      updateWarningBar();
    });
  }

  // 9. Set up all event listeners
  setupEventListeners();

  // 10. Update context bar
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();

  console.log('📚 EPUB 阅读器已就绪');
}

function setupEventListeners() {
  try {
  const safeOn = (sel, evt, fn) => { const el = $(sel); if (el) el.addEventListener(evt, fn); };

  // File upload
  safeOn('#btn-upload', 'click', () => $('#file-input').click());
  safeOn('#file-input', 'change', function() {
    if (this.files && this.files[0]) { handleFileSelected(this.files[0]); this.value = ''; }
  });

  // Chapter search
  const searchDebounced = debounce((query) => {
    renderChapterList(query);
    renderReaderArea();
  }, 150);
  safeOn('#chapter-search', 'input', function() { searchDebounced(this.value); });

  // Clear search
  safeOn('#search-clear', 'click', () => {
    $('#chapter-search').value = '';
    renderChapterList('');
    renderReaderArea();
  });

  // Select all
  safeOn('#select-all-checkbox', 'change', function() {
    const q = ($('#chapter-search').value || '').toLowerCase();
    if (this.checked) {
      chapters.forEach((ch, i) => { if (!q || ch.title.toLowerCase().includes(q) || (ch.text||'').toLowerCase().includes(q) || (ch.text_cn||'').toLowerCase().includes(q)) selectedChapters.add(i); });
    } else {
      chapters.forEach((ch, i) => { if (!q || ch.title.toLowerCase().includes(q) || (ch.text||'').toLowerCase().includes(q) || (ch.text_cn||'').toLowerCase().includes(q)) selectedChapters.delete(i); });
    }
    renderChapterList(q); recalcChapterTokensDebounced(100);
  });

  // Send
  safeOn('#btn-send', 'click', sendMessage);

  // Reset
  safeOn('#btn-reset', 'click', resetConversation);

  // Warnings
  safeOn('#close-warn-40k', 'click', () => { warning40kDismissed = true; const w = $('#warning-40k'); if (w) w.style.display = 'none'; });
  safeOn('#close-warn-85', 'click', () => { warning85Dismissed = true; const w = $('#warning-85'); if (w) w.style.display = 'none'; });

  // Clear history
  safeOn('#clear-history', 'click', () => { if (confirm('确定要清空所有内容吗？（包括当前书籍和对话）')) { clearHistory(); resetBookState(); } });

  // Font
  safeOn('#font-smaller', 'click', () => adjustFont(-1));
  safeOn('#font-larger', 'click', () => adjustFont(1));

  // Reader scroll: update chapter name in header
  safeOn('#reader-content', 'scroll', updateReaderChapterNav);

  // Save button
  const btnSave2 = $('#btn-save-toggle-2');
  if (btnSave2) btnSave2.addEventListener('click', () => { if (!saveMode) enterSaveMode(); else confirmMultiSave(); });

  // Search clear toggle
  safeOn('#chapter-search', 'input', function() {
    const clearBtn = $('#search-clear'); if (clearBtn) clearBtn.style.display = this.value ? 'block' : 'none';
  });

  // Settings
  setupSettingsPanel();

  // Confirm dialog
  safeOn('#confirm-dialog', 'click', e => { if (e.target === $('#confirm-dialog')) $('#confirm-dialog').classList.remove('open'); });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const cd = $('#confirm-dialog'), sm = $('#settings-modal');
      if (cd && cd.classList.contains('open')) cd.classList.remove('open');
      else if (sm && sm.classList.contains('open')) sm.classList.remove('open');
      else if (saveMode) { exitSaveMode(); toast('已退出保存模式'); }
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === '=') { e.preventDefault(); adjustFont(1); }
    if ((e.ctrlKey || e.metaKey) && e.key === '-') { e.preventDefault(); adjustFont(-1); }
  });

  // Click outside → exit save mode
  document.addEventListener('click', function(e) {
    if (!saveMode) return;
    const t = e.target;
    if (t.closest('#btn-save-toggle-2') || t.closest('.msg-sel') || t.closest('.msg-row') || t.closest('.modal-overlay') || t.closest('#toast-container')) return;
    exitSaveMode();
  });

  // Textarea auto-resize
  safeOn('#chat-input', 'input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px'; });

  // Enter to send
  safeOn('#chat-input', 'keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      const val = this.value.trim();
      if (val && !isStreaming) { e.preventDefault(); sendMessage(); }
    }
  });
  } catch(err) { console.error('setupEventListeners error:', err); }
}

// Font size management
function scrollToChapter(idx) {
  const container = $('#reader-content');
  const target = container.querySelector('[data-chapter-idx="' + idx + '"]');
  if (target) {
    container.scrollTop = target.offsetTop - container.offsetTop - 10;
    updateReaderChapterNav();
  }
}

function updateReaderChapterNav() {
  const navEl = $('#reader-chapter-nav');
  const container = $('#reader-content');
  const sections = container.querySelectorAll('.reader-chapter-section');
  if (sections.length === 0) { navEl.textContent = ''; return; }

  const scrollTop = container.scrollTop;
  let currentIdx = -1;
  sections.forEach(section => {
    if (section.offsetTop - container.offsetTop <= scrollTop + 10) {
      currentIdx = parseInt(section.dataset.chapterIdx);
    }
  });

  if (currentIdx >= 0 && chapters[currentIdx]) {
    if (navEl) navEl.textContent = chapters[currentIdx].title;
  } else if (sections.length > 0 && navEl) {
    const firstIdx = parseInt(sections[0].dataset.chapterIdx);
    if (chapters[firstIdx]) navEl.textContent = chapters[firstIdx].title;
  }

  // Sync sidebar chapter list highlight
  const list = $('#chapter-list');
  if (!list) return;
  list.querySelectorAll('.chapter-item.viewing').forEach(item => item.classList.remove('viewing'));
  if (currentIdx >= 0) {
    const activeItem = list.querySelector('.chapter-item[data-idx="' + currentIdx + '"]');
    if (activeItem) activeItem.classList.add('viewing');
  }
}

function applyFontSize(size) {
  globalFontSize = size;
  localStorage.setItem('readerFontSize', size);
  document.documentElement.style.setProperty('--content-font-size', size + 'px');
}

function adjustFont(delta) {
  applyFontSize(clamp(globalFontSize + delta, FONT_MIN, FONT_MAX));
}

// ======================================================================
// STARTUP
// ======================================================================
document.addEventListener('DOMContentLoaded', () => {
  init().catch(err => {
    console.error('初始化失败:', err);
    document.body.innerHTML += '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:9999;font-size:14px;color:#ef4444">初始化错误: ' + err.message + '<br><small>请刷新页面或检查控制台</small></div>';
  });
});
</script>
