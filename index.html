<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB 阅读器</title>
<style>
/* ===================================================================== */
/* 1. CSS Variables — Apple 风格 + 橙色主题                             */
/* ===================================================================== */
:root {
  --font: -apple-system, BlinkMacSystemFont, "SF Pro SC", "SF Pro Display", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --bg:           #f5f5f7;
  --bg-sidebar:   #ffffff;
  --bg-card:      #ffffff;
  --accent:       #e8500c;
  --accent-hover: #c4450a;
  --accent-bg:    rgba(232, 80, 12, 0.06);
  --accent-ring:  rgba(232, 80, 12, 0.15);
  --text-primary:   #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary:  #aeaeb2;
  --border:        rgba(0, 0, 0, 0.08);
  --border-focus:  #e8500c;
  --msg-user-bg:    #f5f5f7;
  --msg-user-text:  #1d1d1f;
  --msg-ai-bg:      #f5f5f7;
  --msg-ai-border:  rgba(0, 0, 0, 0.06);
  --green:      #34c759;
  --yellow:     #f59e0b;
  --red:        #ef4444;
  --red-bg:     rgba(239, 68, 68, 0.06);
  --warning-yellow: #f59e0b;
  --danger-red: #ef4444;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 20px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
  --shadow-lg:  0 8px 40px rgba(0,0,0,0.08);
  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;
  --radius-xl:  18px;
  --content-font-size: 16px;
}

/* ===================================================================== */
/* 2. Reset                                                              */
/* ===================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: var(--font); background: var(--bg);
  color: var(--text-primary); overflow: hidden;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

#app { display: flex; flex-direction: column; height: 100vh; }

/* ===================================================================== */
/* 3. Header — 毛玻璃顶栏                                               */
/* ===================================================================== */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}
#header-left {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  letter-spacing: -0.2px; white-space: nowrap;
}
#header-right { display: flex; align-items: center; gap: 10px; }

/* 本地/云端 模型标签 */
.model-badge-group { display: flex; align-items: center; gap: 6px; }
.model-badge {
  font-family: var(--font); font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 16px; cursor: pointer;
  transition: all 0.15s; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-primary); white-space: nowrap;
}
.model-badge:hover { background: var(--bg); color: var(--accent); }
.model-badge.active {
  border-color: var(--accent); color: var(--text-primary);
  font-weight: 600; background: var(--bg-card);
}
/* 本地选中 → 红色外框 */
.model-badge.active.local-active {
  border-color: var(--red); color: var(--text-primary);
  font-weight: 600; background: var(--bg-card);
}

/* 隐藏原始模型下拉框，JS 仍用它存取数据 */
#model-select { display: none; }

/* macOS 设置齿轮图标按钮 */
.btn-settings-icon {
  width: 30px; height: 30px; display: flex; align-items: center;
  justify-content: center; border: none; background: none;
  border-radius: 50%; cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s;
}
.btn-settings-icon:hover { background: var(--bg); color: var(--text-primary); }
.btn-settings-icon svg { width: 18px; height: 18px; }

/* 旧 btn-header 保留兼容 */
.btn-header {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--text-secondary); background: none; border: none;
  border-radius: 5px; cursor: pointer; padding: 4px 10px;
  transition: all 0.15s; white-space: nowrap;
}
.btn-header:hover { background: var(--bg-sidebar); color: var(--text-primary); }

/* ===================================================================== */
/* 4. Main Layout                                                        */
/* ===================================================================== */
#main { display: flex; flex: 1; overflow: hidden; }

/* ---- Sidebar — 白色画廊级导航 ---- */
#sidebar {
  width: 260px; min-width: 180px; flex-shrink: 0;
  background: var(--bg-sidebar); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-content {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; gap: 14px;
}
.btn-upload {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font); font-size: 12px; font-weight: 600;
  color: var(--text-primary); background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 16px;
  cursor: pointer; padding: 5px 14px;
  transition: all 0.15s;
}
.btn-upload:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); }
.btn-upload:disabled { color: var(--text-tertiary); cursor: not-allowed; }

.section-title {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 600; color: var(--text-primary);
  letter-spacing: 0.3px; padding: 0 4px;
}
.section-title .clear-link {
  font-size: 12px; font-weight: 400; color: var(--text-tertiary); cursor: pointer;
}
.section-title .clear-link:hover { color: var(--accent); }

.history-list { display: flex; flex-direction: column; gap: 2px; }
.history-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-md); cursor: pointer;
  font-size: 13px; color: var(--text-primary); transition: background 0.15s;
}
.history-item:hover { background: rgba(0,0,0,0.03); }
.history-item.active { background: var(--accent-bg); color: var(--accent); }
.history-item .book-info { flex: 1; min-width: 0; }
.history-item .book-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item .book-meta { font-size: 12px; color: var(--text-tertiary); }
.history-item .btn-delete {
  width: 24px; height: 24px; border: none; background: none; border-radius: 50%;
  cursor: pointer; font-size: 12px; color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.15s;
}
.history-item:hover .btn-delete { opacity: 1; }
.history-item .btn-delete:hover { color: var(--red); background: var(--red-bg); }

.current-book {
  font-size: 12px; color: var(--text-primary); font-weight: 600;
  padding: 12px 4px 4px; border-top: 1px solid var(--border);
}

.search-input {
  width: 100%; padding: 8px 12px; font-family: var(--font); font-size: 12px;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg); color: var(--text-primary); outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
.search-input::placeholder { color: var(--text-tertiary); }

.chapter-list {
  display: flex; flex-direction: column; gap: 1px;
  flex: 1; overflow-y: auto; min-height: 120px;
}
.chapter-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 13px; transition: background 0.12s;
}
.chapter-item:hover { background: rgba(0,0,0,0.02); }
.chapter-item input[type="checkbox"] {
  appearance: none; width: 16px; height: 16px;
  border: 1.5px solid var(--text-tertiary); border-radius: 4px;
  cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.15s;
}
.chapter-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
.chapter-item input[type="checkbox"]:checked::after {
  content: ''; position: absolute; left: 4px; top: 1.5px;
  width: 5px; height: 9px; border: solid white;
  border-width: 0 2px 2px 0; transform: rotate(45deg);
}
.chapter-item .chapter-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chapter-item .chapter-meta { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }
.no-results { font-size: 12px; color: var(--text-tertiary); text-align: center; padding: 20px 0; }
.search-highlight { background: #fde68a; color: #1d1d1f; padding: 1px 2px; border-radius: 2px; }

#sidebar-footer {
  padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; flex-direction: column; gap: 10px;
}
.summary-bar {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text-primary); transition: color 0.3s;
  padding: 6px 10px; background: var(--bg); border-radius: var(--radius-sm);
}
.summary-bar.warning { color: var(--yellow); background: rgba(245,158,11,0.06); }
.summary-bar.danger  { color: var(--red);   background: var(--red-bg); }
.summary-bar .warn-icon { font-size: 14px; font-weight: 700; }
.btn-save {
  font-family: var(--font); font-size: 12px; font-weight: 600;
  color: var(--text-primary); background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 16px;
  cursor: pointer; padding: 5px 14px;
  transition: all 0.15s;
}
.btn-save:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); }

/* ---- Column Dividers — 毛玻璃拖拽条 ---- */
.divider {
  width: 5px; background: transparent; cursor: col-resize;
  flex-shrink: 0; position: relative; transition: background 0.2s;
}
.divider::after {
  content: ''; position: absolute; left: 0; top: 20px; bottom: 20px;
  width: 1px; background: var(--border); border-radius: 1px;
}
.divider:hover, .divider.dragging { background: var(--accent-ring); }
.divider:hover::after, .divider.dragging::after { background: var(--accent); }
/* 拖拽时禁止文字选中（蓝色拖影） */
body.drag-resizing, body.drag-resizing * {
  user-select: none; -webkit-user-select: none;
}

/* ---- Reader — 无边阅读舞台 ---- */
#reader {
  width: 400px; min-width: 250px; flex-shrink: 0;
  display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
}
#reader-header {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 10px 20px; gap: 6px; flex-shrink: 0;
}
.font-control { display: flex; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.font-btn {
  font-family: var(--font); font-size: 12px; font-weight: 600;
  color: var(--text-secondary); background: var(--bg-card); border: none;
  cursor: pointer; padding: 5px 14px; transition: all 0.15s;
  white-space: nowrap; letter-spacing: 0.5px;
}
.font-btn:first-child { border-right: 1px solid var(--border); }
.font-btn:hover { background: var(--bg); color: var(--accent); }
.font-btn:active { background: var(--accent-bg); }

#reader-content, .msg-bubble, #chat-input-area textarea { font-size: var(--content-font-size); }
#reader-content { flex: 1; overflow-y: auto; padding: 24px 32px 48px; line-height: 1.85; }
.reader-chapter-title {
  font-size: 22px; font-weight: 600; color: var(--text-primary);
  letter-spacing: -0.3px; margin-bottom: 20px; padding-bottom: 10px;
  border-bottom: 2px solid var(--accent); display: inline-block;
}
.reader-chapter-divider {
  text-align: center; color: var(--text-tertiary);
  margin: 32px 0; font-size: 13px; letter-spacing: 4px;
}

/* ---- Empty States ---- */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; color: var(--text-tertiary); gap: 12px;
}
.empty-state .empty-icon { font-size: 36px; opacity: 0.3; }
.empty-state .empty-text { font-size: 14px; }

/* ---- Chat — 右侧对话面板 ---- */
#chat {
  flex: 1; min-width: 300px; display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg-card); border-left: 1px solid var(--border);
}
#chat-status {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
}
#chat-status-top {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text-secondary);
}
#chat-status-top .book-model { font-weight: 600; color: var(--text-primary); }
.progress-bar-wrap { display: flex; align-items: center; gap: 8px; }
.progress-bar { flex: 1; height: 4px; background: rgba(0,0,0,0.06); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
.progress-fill.green  { background: var(--green); }
.progress-fill.yellow { background: var(--yellow); }
.progress-fill.red    { background: var(--red); }
.progress-fill.black  { background: var(--text-primary); }
.progress-pct { font-size: 12px; color: var(--text-tertiary); font-weight: 500; min-width: 36px; text-align: right; }
.btn-reset {
  font-family: var(--font); font-size: 12px; color: var(--text-tertiary);
  background: none; border: none; cursor: pointer; padding: 2px 8px;
  border-radius: 12px; white-space: nowrap; display: none; transition: all 0.15s;
}
.btn-reset:hover { color: var(--accent); background: var(--accent-bg); }
.btn-reset.visible { display: inline; }

.warning-bar {
  font-size: 12px; color: var(--yellow); padding: 6px 10px;
  background: rgba(245,158,11,0.06); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: space-between;
}
.warning-bar .close-warn {
  cursor: pointer; font-size: 14px; color: var(--text-tertiary);
  background: none; border: none; line-height: 1; padding: 0 2px;
}

/* ---- Messages — 对话气泡 ---- */
#chat-messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
}
#chat-messages .empty-state {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); height: auto;
}
.msg-system { text-align: center; font-size: 12px; color: var(--text-tertiary); padding: 4px 0; }
.msg-row {
  display: flex; flex-direction: column; max-width: 80%; position: relative;
  animation: msgFadeIn 0.25s ease-out;
}
@keyframes msgFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-row.user      { align-self: flex-end; }
.msg-row.assistant { align-self: flex-start; }
.msg-bubble {
  padding: 12px 16px; border-radius: var(--radius-lg); line-height: 1.65;
  position: relative; word-wrap: break-word;
}
.msg-row.user .msg-bubble {
  background: var(--msg-user-bg); color: var(--msg-user-text);
  border: 1px solid var(--msg-ai-border);
  border-bottom-right-radius: 6px; box-shadow: var(--shadow-sm);
}
.msg-row.assistant .msg-bubble {
  background: var(--msg-ai-bg); border: 1px solid var(--msg-ai-border);
  border-bottom-left-radius: 6px; box-shadow: var(--shadow-sm);
}
.msg-bubble p { margin: 0 0 6px; } .msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble strong { font-weight: 600; } .msg-bubble em { font-style: italic; }
.msg-bubble ul, .msg-bubble ol { margin: 6px 0; padding-left: 20px; }
.msg-bubble code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
.msg-bubble pre { background: rgba(0,0,0,0.04); padding: 12px 14px; border-radius: var(--radius-md); overflow-x: auto; font-size: 12px; margin: 6px 0; }
.msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 6px 0; color: var(--text-secondary); }
.msg-row.streaming .msg-bubble::after {
  content: '▍'; animation: blink 1s step-end infinite;
  color: var(--text-tertiary); margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ---- Save Mode ---- */
.msg-sel {
  display: none; position: absolute; left: -30px; top: 50%;
  transform: translateY(-50%); cursor: pointer; width: 22px; height: 22px;
}
.msg-sel input { display: none; }
.msg-sel .cb-box {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border: 2px solid var(--text-tertiary);
  border-radius: 6px; transition: all 0.15s; background: var(--bg-card);
}
.msg-sel input:checked + .cb-box { background: var(--accent); border-color: var(--accent); }
.msg-sel input:checked + .cb-box::after {
  content: ''; width: 5px; height: 10px; border: solid white;
  border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px;
}
.msg-sel .cb-box:hover { border-color: var(--accent); }
.save-mode .msg-sel { display: block; }
.save-mode .msg-row { margin-left: 30px; }

/* ---- Message Toolbar ---- */
.msg-toolbar {
  position: absolute; top: -36px; right: 0; display: flex; gap: 2px;
  opacity: 0; transition: opacity 0.15s;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 3px; box-shadow: var(--shadow-md);
}
.msg-row:hover .msg-toolbar { opacity: 1; }
.toolbar-btn {
  width: 30px; height: 30px; display: flex; align-items: center;
  justify-content: center; border: none; background: none;
  border-radius: var(--radius-sm); cursor: pointer;
  color: var(--text-tertiary); transition: all 0.12s;
}
.toolbar-btn:hover { background: var(--bg); color: var(--accent); }
.toolbar-btn.done { color: var(--accent); }
.toolbar-btn svg { width: 16px; height: 16px; stroke: currentColor; }

/* ---- Input Area — 胶囊输入框 ---- */
#chat-input-area { padding: 14px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
.input-wrap { position: relative; }
.input-wrap textarea {
  width: 100%; min-height: 44px; max-height: 160px;
  padding: 12px 48px 12px 16px;
  font-family: var(--font); font-size: 14px; line-height: 1.5;
  border: 1px solid var(--border); border-radius: 22px;
  background: var(--bg); color: var(--text-primary);
  resize: none; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.input-wrap textarea:focus {
  background: var(--bg-card); border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
}
.input-wrap textarea::placeholder { color: var(--text-tertiary); }
.btn-send {
  position: absolute; right: 6px; bottom: 6px;
  width: 32px; height: 32px; display: flex; align-items: center;
  justify-content: center; border: none;
  background: var(--accent); border-radius: 50%; cursor: pointer;
  color: #fff; transition: all 0.15s;
}
.btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.btn-send:disabled { background: var(--text-tertiary); cursor: not-allowed; transform: none; }
.btn-send svg { width: 16px; height: 16px; }
.btn-send .spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
.btn-send.spinning svg { display: none; }
.btn-send.spinning .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
#save-mode-hint { font-size: 12px; color: var(--accent); display: none; margin-top: 6px; padding-left: 4px; }
.save-mode #save-mode-hint { display: block; }

/* ---- Thinking Indicator ---- */
#thinking-bar {
  display: none; font-size: 12px; color: var(--text-tertiary);
  text-align: center; padding: 8px; margin: 0 16px 4px;
  background: var(--bg); border-radius: var(--radius-md);
}
#thinking-bar.visible { display: block; }
#thinking-bar .dot-pulse::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots {
  0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; }
}

/* ===================================================================== */
/* 5. Toast                                                              */
/* ===================================================================== */
#toast-container { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: var(--radius-lg);
  background: var(--bg-card); border: 1px solid var(--border);
  box-shadow: var(--shadow-lg); font-size: 13px; color: var(--text-primary);
  animation: slideIn 0.3s ease-out; max-width: 340px;
  backdrop-filter: blur(20px);
}
.toast.error   { border-color: var(--red);   color: var(--red); }
.toast.success { border-color: var(--green); color: var(--green); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===================================================================== */
/* 6. Settings Modal — Apple 风格弹窗                                   */
/* ===================================================================== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.25); z-index: 2000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg); width: 420px; max-height: 90vh;
  overflow-y: auto; display: flex; flex-direction: column;
}
.modal-header {

<script>
// ======================================================================
// A. CONSTANTS & CONFIG
// ======================================================================
const API_BASE = 'http://localhost:8765';

// 前端错误上报
window.onerror = function(msg, src, line, col, err) {
  try {
    var stack = (err && err.stack) ? String(err.stack) : '';
    fetch(API_BASE + '/api/log-error', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: String(msg), source: String(src || ''), lineno: line || 0, colno: col || 0, stack: stack})
    });
  } catch(e) {}
  console.error('JS Error:', msg, src, line, col, stack);
};
// ======================================================================
const FONT_MIN = 14, FONT_MAX = 22, FONT_DEFAULT = 16;
const DEFAULT_CONTEXT_LIMIT = 48000;
const MAX_HISTORY = 10;
const CHAPTER_WARN_LIMIT = 40000;
const DEFAULT_VAULT_PATH = 'Inbox/Epub阅读/';
const DEFAULT_SYSTEM_PROMPT = '你是博学的阅读助手。以下是《{book_name}》中用户选中的章节原文。优先基于原文内容回答并引用原文。如果问题超出原文范围，可以结合你的知识回答，但要明确区分原文信息和你自己的知识。不知道就说不知道，不要编造信息。';

// ======================================================================
// B. GLOBAL STATE
// ======================================================================
let chapters = [];               // {title, text, text_cn, tokens_approx}
let bookName = '';
let repairLevel = 0;
let selectedChapters = new Set(); // indices
let chapterTokens = 0;
let customSystemPrompt = '';     // 用户自定义系统提示词，空字符串=使用默认
let conversationTokens = 0;
let conversationHistory = [];    // [{role, content}]
let contextLimit = DEFAULT_CONTEXT_LIMIT;
let contextLimitByModel = {};     // 按模型记住上下文设置: { 'ollama:xxx': 48000, 'deepseek:xxx': 128000 }
let chineseOnly = true;
let currentModel = '';
let ollamaModels = [];
let webSearchEnabled = false;
let saveMode = false;
let vaultPath = DEFAULT_VAULT_PATH;
let activeAbortController = null;
let isStreaming = false;
let globalFontSize = FONT_DEFAULT;
let msgIdCounter = 0;
let prevOllamaModel = '';
let warning40kDismissed = false;
let warning85Dismissed = false;
let recalcTimer = null;  // debounce timer for recalcChapterTokens

// ======================================================================
// C. UTILITY FUNCTIONS
// ======================================================================
function toast(msg, type = 'info', duration = 2500) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + (type === 'info' ? '' : type);
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function formatDate(isoString) {
  const d = new Date(isoString);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const dDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const time = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (dDay.getTime() === today.getTime()) return '今天 ' + time;
  if (dDay.getTime() === yesterday.getTime()) return '昨天 ' + time;
  return (d.getMonth() + 1) + '-' + d.getDate() + ' ' + time;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function getDisplayText(chapter) {
  return chineseOnly ? chapter.text_cn : chapter.text;
}

// ======================================================================
// D. API LAYER
// ======================================================================
async function apiLoadOllamaModels() {
  try {
    const resp = await fetch(API_BASE + '/api/ollama-models');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    ollamaModels = data.models || [];
    return ollamaModels;
  } catch (err) {
    console.warn('Ollama 模型列表获取失败:', err);
    return [];
  }
}

async function apiUploadEpub(file) {
  const form = new FormData();
  form.append('file', file);
  const resp = await fetch(API_BASE + '/api/load-epub', { method: 'POST', body: form });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || '上传失败 (HTTP ' + resp.status + ')');
  }
  return await resp.json();
}

async function apiCountTokens(text, model) {
  try {
    const resp = await fetch(API_BASE + '/api/count-tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model }),
      signal: AbortSignal.timeout(10000)
    });
    if (!resp.ok) return 0;
    const data = await resp.json();
    return data.tokens || 0;
  } catch (e) { return 0; }
}

async function apiCountTokensBatch(texts, model) {
  if (!texts || texts.length === 0) return [];
  try {
    const resp = await fetch(API_BASE + '/api/count-tokens-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texts, model }),
      signal: AbortSignal.timeout(15000)
    });
    if (!resp.ok) throw new Error('批量 token 计算失败');
    const data = await resp.json();
    return data.tokens || [];
  } catch (e) {
    // fallback: use approximate tokens
    return texts.map(t => 0);
  }
}

async function apiSaveObsidian(bookName, messages) {
  const resp = await fetch(API_BASE + '/api/save-obsidian', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ book_name: bookName, messages })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail || err.error || '保存失败');
  }
  return await resp.json();
}

async function apiSearchDuckDuckGo(query) {
  try {
    const resp = await fetch(
      'https://api.duckduckgo.com/?q=' + encodeURIComponent(query) + '&format=json&no_html=1&skip_disambig=1',
      { signal: AbortSignal.timeout(8000) }
    );
    const data = await resp.json();
    const results = [];
    if (data.AbstractText) {
      results.push({ title: data.Heading || '摘要', snippet: data.AbstractText, url: data.AbstractURL });
    }
    for (const topic of (data.RelatedTopics || [])) {
      if (topic.Text && topic.FirstURL) {
        results.push({ title: topic.Text.split(' - ')[0], snippet: topic.Text, url: topic.FirstURL });
      }
    }
    return results.slice(0, 5);
  } catch (err) {
    console.warn('联网搜索失败:', err);
    return [];
  }
}

// SSE Stream handler with cross-chunk buffer
function apiChatStream(body, { onToken, onTokensUsed, onDone, onError }) {
  const controller = new AbortController();
  activeAbortController = controller;

  (async () => {
    try {
      const resp = await fetch(API_BASE + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: AbortSignal.any([controller.signal, AbortSignal.timeout(300000)])
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        onError(err.error || err.detail || '对话请求失败 (HTTP ' + resp.status + ')');
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = ''; // cross-chunk line buffer

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') { onDone(); return; }
          try {
            const data = JSON.parse(payload);
            if (data.content) onToken(data.content);
            if (data.tokens_used !== undefined) onTokensUsed(data.tokens_used);
            if (data.error) onError(data.error);
          } catch (e) { /* skip non-JSON lines */ }
        }
      }
      // flush remaining buffer
      if (buffer.startsWith('data: ')) {
        const payload = buffer.slice(6);
        if (payload !== '[DONE]') {
          try {
            const data = JSON.parse(payload);
            if (data.content) onToken(data.content);
            if (data.tokens_used !== undefined) onTokensUsed(data.tokens_used);
          } catch (e) { /* skip */ }
        }
      }
      onDone();
    } catch (err) {
      if (err.name === 'AbortError') return;
      onError('网络连接失败，请检查服务是否运行');
    }
  })();

  return controller;
}

// ======================================================================
// E. LOCALSTORAGE PERSISTENCE
// ======================================================================
function saveHistory() {
  const data = (loadHistory() || []).filter(h => h.name !== bookName);
  if (bookName && chapters.length > 0) {
    data.unshift({
      name: bookName,
      chapters: chapters.map(c => ({ title: c.title })),
      totalChapters: chapters.length,
      lastOpened: new Date().toISOString()
    });
  }
  const trimmed = data.slice(0, MAX_HISTORY);
  try { localStorage.setItem('epub-reader-history', JSON.stringify(trimmed)); } catch (e) {}
  return trimmed;
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('epub-reader-history')) || []; } catch (e) { return []; }
}

function removeFromHistory(name) {
  let data = loadHistory().filter(h => h.name !== name);
  try { localStorage.setItem('epub-reader-history', JSON.stringify(data)); } catch (e) {}
  renderHistoryList();
}

function clearHistory() {
  try { localStorage.removeItem('epub-reader-history'); } catch (e) {}
  renderHistoryList();
}

function saveSettings() {
  // 保存前把当前模型的上下文记录到 map 中
  if (currentModel) {
    contextLimitByModel[currentModel] = contextLimit;
  }
  try {
    localStorage.setItem('epub-reader-settings', JSON.stringify({
      contextLimit, chineseOnly, vaultPath, customSystemPrompt, contextLimitByModel
    }));
  } catch (e) {}
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('epub-reader-settings'));
    if (s) {
      contextLimit = s.contextLimit || DEFAULT_CONTEXT_LIMIT;
      chineseOnly = s.chineseOnly !== undefined ? s.chineseOnly : true;
      vaultPath = s.vaultPath || DEFAULT_VAULT_PATH;
      customSystemPrompt = s.customSystemPrompt || '';
      contextLimitByModel = s.contextLimitByModel || {};
    }
  } catch (e) {}
  // 如果保存的上下文超过当前模型上限，自动 clamp
  const maxCtx = getContextMax();
  if (contextLimit > maxCtx) {
    contextLimit = maxCtx;
  }
}

function applySettingsToForm() {
  const maxCtx = getContextMax();
  $('#ctx-slider').max = maxCtx;
  $('#ctx-slider').value = contextLimit;
  $('#ctx-number').max = maxCtx;
  $('#ctx-number').value = contextLimit;
  $('#ctx-current').textContent = contextLimit;
  $('#chinese-only').checked = chineseOnly;
  $('#vault-path').value = vaultPath;
  $('#system-prompt').value = customSystemPrompt;
}

function saveConversation() {
  try {
    localStorage.setItem('epub-reader-conversation', JSON.stringify(
      conversationHistory.slice(-20)
    ));
  } catch (e) {}
}

function loadConversation() {
  try { return JSON.parse(localStorage.getItem('epub-reader-conversation')) || []; } catch (e) { return []; }
}

function renderHistoryList() {
  const list = $('#history-list');
  const data = loadHistory();
  if (data.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary);padding:8px">暂无记录</div>';
    return;
  }
  list.innerHTML = data.map((h, i) =>
    '<div class="history-item' + (h.name === bookName ? ' active' : '') + '" data-idx="' + i + '">' +
    '<div class="book-info"><div class="book-name">' + escapeHtml(h.name) + '</div>' +
    '<div class="book-meta">' + h.totalChapters + '章 · ' + formatDate(h.lastOpened) + '</div></div>' +
    '<button class="btn-delete" data-name="' + escapeHtml(h.name) + '">✕</button></div>'
  ).join('');

  // click handlers
  list.querySelectorAll('.history-item').forEach(item => {

      if (e.target.closest('.btn-delete')) return;
      const name = this.querySelector('.book-name').textContent;
      loadFromHistory(name);
    });

function renderChapterList(filterQuery = '') {
  const container = $('#chapter-list');
  const selectAllRow = $('#select-all-row');
  const q = (filterQuery || '').toLowerCase();

  if (chapters.length === 0) {
    container.innerHTML = '';
    selectAllRow.style.display = 'none';
    return;
  }

  selectAllRow.style.display = 'flex';

  let html = '';
  let visible = 0;
  let visibleSelected = 0;
  chapters.forEach((ch, i) => {
    const match = !q || ch.title.toLowerCase().includes(q) || (ch.text || '').toLowerCase().includes(q) || (ch.text_cn || '').toLowerCase().includes(q);
    if (!match) return;
    visible++;
    if (selectedChapters.has(i)) visibleSelected++;
    const checked = selectedChapters.has(i);
    const tokens = ch.tokens !== undefined ? ch.tokens : (ch.tokens_approx || 0);
    html += '<label class="chapter-item">' +
      '<input type="checkbox" data-idx="' + i + '" ' + (checked ? 'checked' : '') + '>' +
      '<span class="chapter-title">' + escapeHtml(ch.title) + '</span>' +
      '<span class="chapter-meta">' + formatTokens(tokens) + '</span>' +
      '</label>';
  });

  if (visible === 0 && q) {
    html = '<div class="no-results">无匹配章节</div>';
  }

  // 章节计数提示
  if (chapters.length > 0) {
    html += '<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:8px 0">共 ' + chapters.length + ' 章' + (q ? '，匹配 ' + visible + ' 章' : '，已选 ' + selectedChapters.size + ' 章') + '</div>';
  }

  container.innerHTML = html;

  // bind checkbox events
  container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() {
      const idx = parseInt(this.dataset.idx);
      handleChapterToggle(idx, this.checked);
    });
  });

  // sync select-all checkbox state
  syncSelectAllCheckbox(visible, visibleSelected);
}

function syncSelectAllCheckbox(visible, visibleSelected) {
  const cb = $('#select-all-checkbox');
  if (!cb) return;
  if (visible === 0) {
    cb.checked = false;
    cb.indeterminate = false;
  } else if (visibleSelected === 0) {
    cb.checked = false;
    cb.indeterminate = false;
  } else if (visibleSelected >= visible) {
    cb.checked = true;
    cb.indeterminate = false;
  } else {
    cb.checked = false;
    cb.indeterminate = true;
  }
}

function updateChapterTokenDisplay() {
  $('#chapter-list').querySelectorAll('.chapter-item').forEach(item => {
    const cb = item.querySelector('input[type="checkbox"]');
    if (!cb) return;
    const idx = parseInt(cb.dataset.idx);
    const meta = item.querySelector('.chapter-meta');
    if (meta && chapters[idx] && chapters[idx].tokens !== undefined) {
      meta.textContent = formatTokens(chapters[idx].tokens);
    }
  });
}

function updateSummaryBar() {
  const footer = $('#sidebar-footer');
  if (chapters.length === 0) {
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'flex';
  const count = selectedChapters.size;
  const total = chapters.length;
  const bar = $('#summary-bar');
  const warnIcon = bar.querySelector('.warn-icon');

  $('#summary-count').textContent = '已选 ' + count + '/' + total + ' 章';
  $('#summary-tokens').innerHTML = formatTokens(chapterTokens) + '<span class="warn-icon"></span>';

  const remainingForChat = contextLimit - 8000;
  bar.className = 'summary-bar';
  bar.querySelector('.warn-icon').textContent = '';

  if (chapterTokens > remainingForChat) {
    bar.classList.add('danger');
    bar.querySelector('.warn-icon').textContent = ' ⚠';
  } else if (chapterTokens > CHAPTER_WARN_LIMIT) {
    bar.classList.add('warning');
    bar.querySelector('.warn-icon').textContent = ' ⚠';
  }
}

function updateCurrentBookIndicator() {
  const el = $('#current-book');
  if (bookName) {
    el.style.display = 'block';
    el.textContent = '当前：《' + bookName + '》';
  } else {
    el.style.display = 'none';
  }
}

function highlightText(text, query) {
  if (!query) return text;
  // escape regex special chars in query
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="search-highlight">$1</span>');
}

function renderReaderArea() {
  const container = $('#reader-content');
  const empty = $('#reader-empty');
  const query = ($('#chapter-search').value || '').trim();

  if (selectedChapters.size === 0) {
    container.innerHTML = '';
    // 重新创建 empty state（之前的 innerHTML 可能已清除）
    const emptyEl = document.createElement('div');
    emptyEl.className = 'empty-state';
    emptyEl.id = 'reader-empty';
    emptyEl.innerHTML = '';
    container.appendChild(emptyEl);
    return;
  }

  // 移除旧的 empty state（如果存在）
  if (empty) empty.remove();

  const selected = [...selectedChapters].sort((a, b) => a - b);
  let html = '';
  selected.forEach((idx, i) => {
    if (i > 0) html += '<div class="reader-chapter-divider">───</div>';
    const ch = chapters[idx];
    html += '<span class="reader-chapter-title">' + highlightText(escapeHtml(ch.title), query) + '</span>';
    const text = getDisplayText(ch);
    const paragraphs = text.split('\n').filter(p => p.trim());
    paragraphs.forEach(p => {
      html += '<p>' + highlightText(escapeHtml(p), query) + '</p>';
    });
  });
  container.innerHTML = html;
  container.scrollTop = 0;
}

function addMessage(role, content, msgId) {
  const container = $('#chat-messages');
  const empty = $('#chat-empty');
  if (empty) empty.style.display = 'none';

  if (!msgId) msgId = 'msg-' + (++msgIdCounter);

  if (role === 'system') {
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.id = msgId;
    el.textContent = content;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return msgId;
  }

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  row.id = msgId;

  // save mode checkbox
  const sel = document.createElement('label');
  sel.className = 'msg-sel';
  sel.innerHTML = '<input type="checkbox" data-msg="' + msgId + '"><span class="cb-box"></span>';
  row.appendChild(sel);

  // bubble
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant' && typeof marked !== 'undefined') {
    bubble.innerHTML = marked.parse(content);
  } else {
    bubble.innerHTML = content.replace(/\n/g, '<br>');
  }
  row.appendChild(bubble);

  // toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'msg-toolbar';
  // copy button
  toolbar.innerHTML =
    '<button class="toolbar-btn btn-copy" title="复制" data-msg="' + msgId + '">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
    '</button>';
  // save button (AI messages only)
  if (role === 'assistant') {
    toolbar.innerHTML +=
      '<button class="toolbar-btn btn-save-single" title="保存到 Obsidian" data-msg="' + msgId + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
      '</button>';
  }
  row.appendChild(toolbar);

  // toolbar events
  row.querySelector('.btn-copy').addEventListener('click', function(e) {
    e.stopPropagation();
    copyMessage(msgId, this);
  });
  const saveBtn = row.querySelector('.btn-save-single');
  if (saveBtn) {
    saveBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      saveSingleMessage(msgId, this);
    });
  }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
  return msgId;
}

function updateMessageContent(msgId, content, isMarkdown = false) {
  const row = document.getElementById(msgId);
  if (!row) return;
  const bubble = row.querySelector('.msg-bubble');
  if (!bubble) return;
  if (isMarkdown && typeof marked !== 'undefined') {
    bubble.innerHTML = marked.parse(content);
  } else {
    bubble.innerHTML = content.replace(/\n/g, '<br>');
  }
  const container = $('#chat-messages');
  container.scrollTop = container.scrollHeight;
}

function addSystemMessage(content) {

}

function renderConversation(history) {

  history.forEach(msg => {
    addMessage(msg.role, msg.content);

function clearChatMessages() {
  $('#chat-messages').innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'empty-state';
  empty.id = 'chat-empty';
  empty.innerHTML = '';
  $('#chat-messages').appendChild(empty);

function updateContextBar() {
  const total = chapterTokens + conversationTokens;
  const pct = contextLimit > 0 ? Math.min(100, (total / contextLimit) * 100) : 0;
  const fill = $('#progress-fill');
  const pctEl = $('#progress-pct');
  const resetBtn = $('#btn-reset');

  fill.style.width = Math.max(pct, 0.5) + '%';
  fill.className = 'progress-fill ' + getContextColor(pct);
  // 小百分比显示一位小数，避免 0.1% → 0% 的误解
  pctEl.textContent = pct > 0 && pct < 1 ? pct.toFixed(1) + '%' : Math.round(pct) + '%';

  // reset button: visible only when > 80%
  if (pct > 80) {
    resetBtn.classList.add('visible');
  } else {
    resetBtn.classList.remove('visible');
  }

  // update send button state
  updateSendButtonState();
}

function getContextColor(pct) {
  if (pct >= 90) return 'black';
  if (pct >= 80) return 'red';
  if (pct >= 60) return 'yellow';
  return 'green';
}

function updateWarningBar() {
  const bar40k = $('#warning-40k');
  const bar85 = $('#warning-85');
  const total = chapterTokens + conversationTokens;
  const pct = contextLimit > 0 ? (total / contextLimit) * 100 : 0;

  // 40K warning
  if (chapterTokens > CHAPTER_WARN_LIMIT && !warning40kDismissed) {
    bar40k.style.display = 'flex';
    $('#warning-40k-msg').textContent =
      '⚠️ 选中章节超过 40K tokens（' + formatTokens(chapterTokens) + '），建议减少章节选择以确保对话空间';
  } else {
    bar40k.style.display = 'none';
  }

  // 85% warning
  if (pct >= 85 && pct < 95 && !warning85Dismissed) {
    bar85.style.display = 'flex';
  } else {
    bar85.style.display = 'none';
  }
}

function updateSendButtonState() {
  const btn = $('#btn-send');
  // 只在没选章节时禁用按钮；超出上下文时给警告但不阻塞（后端会自动截断）
  const disabled = selectedChapters.size === 0;
  btn.disabled = disabled;
  // 流式输出时不 disable（让用户可以点击中止），但通过 CSS class 显示停止状态
  if (isStreaming) {
    btn.classList.add('spinning');
    btn.title = '停止生成';
  } else {
    btn.classList.remove('spinning');
    btn.title = '发送';
  }
}

function updateStatusBar() {
  const el = $('#chat-book-model');
  if (bookName) {
    el.textContent = '《' + bookName + '》';
  } else {
    el.textContent = '尚未加载书籍';
  }
}

// ======================================================================
// G. CORE BUSINESS LOGIC
// ======================================================================
async function recalcChapterTokens() {
  if (selectedChapters.size === 0) {
    chapterTokens = 0;
    updateSummaryBar();
    updateContextBar();
    updateWarningBar();
    return;
  }
  const selected = [...selectedChapters].sort((a, b) => a - b);
  const texts = selected.map(idx => getDisplayText(chapters[idx]));
  try {
    const tokens = await apiCountTokensBatch(texts, currentModel);
    // update stored tokens for each selected chapter
    selected.forEach((idx, i) => {
      chapters[idx].tokens = tokens[i] || chapters[idx].tokens_approx;
    });
    chapterTokens = tokens.reduce((a, b) => a + b, 0);
    updateChapterTokenDisplay();
  } catch (err) {
    // fallback: use tokens_approx
    chapterTokens = selected.reduce((sum, idx) => sum + (chapters[idx].tokens_approx || 0), 0);
    console.warn('批量 token 计算失败，使用近似值:', err);
  }
  updateSummaryBar();
  updateContextBar();
  updateWarningBar();
}

// 防抖版本：快速连续切换章节时只触发最后一次
function recalcChapterTokensDebounced(delay = 400) {
  if (recalcTimer) clearTimeout(recalcTimer);
  recalcTimer = setTimeout(() => {
    recalcTimer = null;
    recalcChapterTokens();
  }, delay);
}

function handleChapterToggle(idx, checked) {
  const prevDisplayed = new Set(selectedChapters);
  if (checked) {
    selectedChapters.add(idx);
  } else {
    selectedChapters.delete(idx);
  }
  const nowDisplayed = new Set(selectedChapters);

  // check if displayed chapters changed (affects reader content)
  const displayedChanged = !setsEqual(prevDisplayed, nowDisplayed);

  if (displayedChanged) {
    renderReaderArea();
  }

  // 立即用近似值更新 UI（不等 API），提升响应速度
  const approxTokens = [...selectedChapters].reduce((sum, i) => sum + (chapters[i].tokens_approx || 0), 0);
  chapterTokens = approxTokens;
  updateSummaryBar();
  updateContextBar();
  updateWarningBar();

  // 然后异步精确计算
  recalcChapterTokensDebounced();

  // sync select-all checkbox state
  syncSelectAllAfterToggle();
}

function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const v of a) { if (!b.has(v)) return false; }
  return true;
}

// 章节勾选变化后同步全选框状态（不重新渲染整个列表）
function syncSelectAllAfterToggle() {
  const q = ($('#chapter-search').value || '').toLowerCase();
  let visible = 0, visibleSelected = 0;
  chapters.forEach((ch, i) => {
    const match = !q || ch.title.toLowerCase().includes(q) || (ch.text || '').toLowerCase().includes(q) || (ch.text_cn || '').toLowerCase().includes(q);
    if (match) {
      visible++;
      if (selectedChapters.has(i)) visibleSelected++;
    }
  });
  syncSelectAllCheckbox(visible, visibleSelected);
}

async function sendMessage() {
  if (isStreaming) {
    // stop streaming
    if (activeAbortController) {
      activeAbortController.abort();
      activeAbortController = null;
    }
    isStreaming = false;
    updateSendButtonState();
    return;
  }

  const textarea = $('#chat-input');
  const question = textarea.value.trim();
  if (!question) return;
  if (selectedChapters.size === 0) {
    toast('请先在左侧选择要阅读的章节');
    return;
  }

  const total = chapterTokens + conversationTokens;
  if (total > contextLimit) {
    // 警告但不阻塞——后端会自动截断章节内容以适应上下文窗口
    toast('⚠️ 上下文超出限制，章节内容将被自动截断', 'error', 3000);
  }

  // abort previous stream
  if (activeAbortController) {
    activeAbortController.abort();
    activeAbortController = null;
  }

  isStreaming = true;
  textarea.value = '';
  textarea.style.height = 'auto';
  updateSendButtonState();

  // 安全超时：5分钟后强制重置 streaming 状态
  const streamTimeout = setTimeout(() => {
    if (isStreaming) {
      isStreaming = false;
      if (activeAbortController) {
        activeAbortController.abort();
        activeAbortController = null;
      }
      updateSendButtonState();
      console.warn('流式超时保护触发');
    }
  }, 300000);

  // add user message
  const userMsgId = addMessage('user', question);
  conversationHistory.push({ role: 'user', content: question });

  // add empty AI message for streaming
  const aiMsgId = addMessage('assistant', '');
  const aiRow = document.getElementById(aiMsgId);
  if (aiRow) aiRow.classList.add('streaming');
  let aiContent = '';
  let tokensUsed = 0;

  // web search (if enabled + DeepSeek)
  let searchResults = [];
  if (webSearchEnabled && currentModel.startsWith('deepseek')) {
    showThinking('正在搜索...');
    searchResults = await apiSearchDuckDuckGo(question);
    hideThinking();
    if (searchResults.length === 0) {
      addSystemMessage('未找到相关搜索结果');
    }
  }

  // build messages
  const selected = [...selectedChapters].sort((a, b) => a - b);
  const chapterText = selected.map(idx => {
    const ch = chapters[idx];
    return '## ' + ch.title + '\n\n' + getDisplayText(ch);
  }).join('\n\n---\n\n');

  let augmentedQuestion = question;
  if (searchResults.length > 0) {
    const ctx = searchResults.map((r, i) =>
      '[搜索结果 ' + (i + 1) + ']\n标题: ' + r.title + '\n来源: ' + r.url + '\n内容: ' + r.snippet
    ).join('\n\n');
    augmentedQuestion =
      '以下是与问题相关的网络搜索结果，请结合这些信息和《' + bookName + '》原文回答：\n\n' +
      ctx + '\n\n---\n用户问题: ' + question +
      '\n\n要求: 优先使用原文内容回答。如果原文信息不足，再参考搜索结果。引用搜索结果时需注明来源。';
  }

  const messages = [
    { role: 'system', content: '你是博学的阅读助手。以下是《' + bookName + '》中用户选中的章节原文。优先基于原文内容回答并引用原文。如果问题超出原文范围，可以结合你的知识回答，但要明确区分原文信息和你自己的知识。不知道就说不知道，不要编造信息。\n\n' + chapterText },
    ...conversationHistory.slice(0, -1), // exclude the user message we just added
    { role: 'user', content: augmentedQuestion }
  ];

  const body = {
    model: currentModel,
    chapters_text: chapterText,
    book_name: bookName,
    history: conversationHistory.slice(0, -1),
    question: augmentedQuestion,
    context_limit: contextLimit,
    system_prompt: customSystemPrompt || ''
  };

  apiChatStream(body, {
    onToken(content) {
      aiContent += content;
      updateMessageContent(aiMsgId, aiContent, false);
    },
    onTokensUsed(tokens) {
      tokensUsed = tokens;
    },
    onDone() {
      clearTimeout(streamTimeout);
      // render final markdown
      updateMessageContent(aiMsgId, aiContent, true);
      if (aiRow) aiRow.classList.remove('streaming');
      conversationHistory.push({ role: 'assistant', content: aiContent });
      conversationTokens += tokensUsed;
      isStreaming = false;
      activeAbortController = null;
      updateContextBar();
      updateWarningBar();
      updateSendButtonState();
      saveConversation();
      checkContextAndHandle();
    },
    onError(msg) {
      clearTimeout(streamTimeout);
      updateMessageContent(aiMsgId, '⚠️ ' + msg, false);
      if (aiRow) aiRow.classList.remove('streaming');
      isStreaming = false;
      activeAbortController = null;
      updateSendButtonState();
      toast(msg, 'error');
    }
  });
}

function checkContextAndHandle() {
  const total = chapterTokens + conversationTokens;
  const pct = contextLimit > 0 ? (total / contextLimit) : 0;

  if (pct >= 0.85) {
    warning85Dismissed = false;
    updateWarningBar();
  }

  updateWarningBar();
}

function resetConversation() {
  showConfirmDialog('确定要重置对话吗？章节选择和原文不受影响。', () => {
    clearChatMessages();
    conversationHistory = [];
    conversationTokens = 0;
    addSystemMessage('📝 对话已重置，可以开始新的讨论');
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
    saveConversation();
    toast('对话已重置');
  });
}

function getContextMax() {
  // DeepSeek V4 Flash 支持 128K，不受 48K 限制
  if (currentModel === 'deepseek:deepseek-v4-flash') return 128000;
  if (currentModel.startsWith('deepseek:')) return 96000;
  return 48000;
}

function updateContextSliderMax() {
  const maxCtx = getContextMax();
  const slider = $('#ctx-slider');
  const number = $('#ctx-number');
  slider.max = maxCtx;
  number.max = maxCtx;
  // clamp：当前上下文不能超过模型上限
  if (contextLimit > maxCtx) {
    contextLimit = maxCtx;
    saveSettings();
  }
  // 始终同步滑条显示 + 刷新按钮状态
  slider.value = contextLimit;
  number.value = contextLimit;
  $('#ctx-current').textContent = contextLimit;
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();
}

async function handleModelChange(newModel) {
  if (currentModel === newModel) return;

  // 中止当前流式输出（防止 Ollama 大上下文挂起阻塞）
  if (activeAbortController) {
    activeAbortController.abort();
    activeAbortController = null;
  }
  if (isStreaming) {
    isStreaming = false;
    updateSendButtonState();
    hideThinking();
    document.querySelectorAll('.msg-row.streaming').forEach(r => r.classList.remove('streaming'));
  }

  // 保存当前模型的上下文设置
  if (currentModel) {
    contextLimitByModel[currentModel] = contextLimit;
  }

  if (newModel.startsWith('deepseek')) {
    if (currentModel.startsWith('ollama:')) prevOllamaModel = currentModel;
    webSearchEnabled = true;
  } else if (newModel.startsWith('ollama:')) {
    webSearchEnabled = false;
  }

  currentModel = newModel;

  // 同步本地/云端 badge 状态
  const bl = $('#badge-local');
  const bc = $('#badge-cloud');
  if (bl && bc) {
    if (newModel.startsWith('ollama:')) {
      bl.classList.add('active', 'local-active'); bc.classList.remove('active');
    } else {
      bc.classList.add('active'); bl.classList.remove('active', 'local-active');
    }
  }

  // 恢复新模型的上下文设置（如果之前保存过），否则使用默认上限
  if (contextLimitByModel[newModel]) {
    contextLimit = contextLimitByModel[newModel];
  } else {
    contextLimit = getContextMax();
  }

  // 更新滑条上限（clamp 当前值如果需要）+ 刷新按钮状态
  updateContextSliderMax();

  updateStatusBar();

  // 立即刷新上下文进度条和发送按钮（使用当前 chapterTokens + 新 contextLimit）
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();

  // recalculate tokens with new tokenizer (fire-and-forget, 不阻塞切换)
  if (chapters.length > 0) {
    recalcChapterTokens().catch(() => {});
  }
}

async function resetBookState() {
  // 中止当前流式输出
  if (activeAbortController) {
    activeAbortController.abort();
    activeAbortController = null;
  }
  isStreaming = false;

  bookName = '';
  chapters = [];
  repairLevel = 0;
  selectedChapters = new Set();
  chapterTokens = 0;
  conversationTokens = 0;
  conversationHistory = [];
  warning40kDismissed = false;
  warning85Dismissed = false;

  clearChatMessages();
  renderChapterList();
  renderReaderArea();
  updateCurrentBookIndicator();
  updateStatusBar();
  updateSummaryBar();
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();
  saveConversation();

  $('#chat-book-model').textContent = '尚未加载书籍';
  $('#sidebar-footer').style.display = 'none';
  toast('已清空所有内容');
}

async function loadFromHistory(name) {
  // Try to load from backend cache (内存 → 磁盘缓存 → 本地 EPUB 重解析)
  try {
    const resp = await fetch(API_BASE + '/api/load-epub', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ book_name: name, from_cache: true })
    });
    if (resp.ok) {
      const data = await resp.json();
      applyBookData(data);
      return;
    }
  } catch (e) {}

  // 所有恢复方式都失败，需要重新上传
  toast('《' + name + '》需要重新上传 EPUB 文件', 'error');
}

async function handleFileSelected(file) {
  if (!file) return;
  if (conversationHistory.length > 0) {
    showConfirmDialog('加载新书将清空当前对话，是否继续？', async () => {
      await doUpload(file);
    });
  } else {
    await doUpload(file);
  }
}

async function doUpload(file) {
  const btn = $('#btn-upload');
  btn.disabled = true;
  btn.textContent = '加载中...';

  try {
    const data = await apiUploadEpub(file);
    applyBookData(data);

    // handle repair level toasts
    if (data.repair_level === 1) {
      toast('EPUB 目录结构已自动修复，章节顺序可能与原书略有差异');
    } else if (data.repair_level === 2) {
      toast('EPUB 文件存在损坏，已尽力修复并提取可读内容');
    } else if (data.repair_level === 3) {
      toast('⚠️ EPUB 严重损坏，已使用原始模式提取文本片段，无章节结构', 'error');
    }
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '打开 EPUB';
  }
}

function applyBookData(data) {
  bookName = data.name || '';
  chapters = data.chapters || [];
  repairLevel = data.repair_level || 0;
  selectedChapters = new Set();  // 默认不选，用户手动勾选

  chapterTokens = 0;
  conversationTokens = 0;
  conversationHistory = [];
  warning40kDismissed = false;
  warning85Dismissed = false;

  clearChatMessages();
  renderChapterList();
  updateCurrentBookIndicator();
  updateStatusBar();
  saveHistory();
  renderHistoryList();
  renderReaderArea();

  // 立即用 tokens_approx 显示近似 token 数（不等异步 API）
  chapterTokens = [...selectedChapters].reduce((sum, idx) => sum + (chapters[idx].tokens_approx || 0), 0);
  updateSummaryBar();
  updateContextBar();
  updateWarningBar();

  // 异步精确计算 token
  recalcChapterTokens();

  // update settings form
  applySettingsToForm();

  $('#chat-book-model').textContent = bookName ? '《' + bookName + '》' : '尚未加载书籍';

  // 更新对话区空状态文案
  const chatEmpty = $('#chat-empty');
  if (chatEmpty) {
    chatEmpty.innerHTML = '';
  }
}

// ======================================================================
// H. EVENT HANDLERS
// ======================================================================
function copyMessage(msgId, btn) {
  const row = document.getElementById(msgId);
  if (!row) return;
  const bubble = row.querySelector('.msg-bubble');
  const text = bubble ? bubble.textContent : '';
  const origHTML = btn.innerHTML;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;stroke:currentColor"><polyline points="20 6 9 17 4 12"/></svg>';
      btn.classList.add('done');
      toast('已复制到剪贴板');
      setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('done'); }, 1500);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('已复制到剪贴板'); } catch (e) { toast('复制失败', 'error'); }
    document.body.removeChild(ta);
  }
}

async function saveSingleMessage(msgId, btn) {
  const row = document.getElementById(msgId);
  if (!row) return;
  const bubble = row.querySelector('.msg-bubble');
  const content = bubble ? bubble.textContent : '';
  const origHTML = btn.innerHTML;

  try {
    await apiSaveObsidian(bookName || '未命名', [{ role: 'assistant', content }]);
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;stroke:currentColor"><polyline points="20 6 9 17 4 12"/></svg>';
    btn.classList.add('done');
    toast('已保存到 Obsidian');
    setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('done'); }, 1500);
  } catch (err) {
    toast(err.message, 'error');
  }
}

function enterSaveMode() {
  saveMode = true;
  $('#chat-messages').classList.add('save-mode');
  $('#btn-save-toggle').textContent = '确认保存';
  $('#btn-save-toggle').style.fontWeight = '600';
  document.querySelectorAll('.msg-sel input').forEach(cb => cb.checked = false);
  toast('勾选要保存的消息，完成后点击「确认保存」或按 Esc 退出');
}

function exitSaveMode() {
  saveMode = false;
  $('#chat-messages').classList.remove('save-mode');
  $('#btn-save-toggle').textContent = '保存到 Obsidian';
  $('#btn-save-toggle').style.fontWeight = '500';
  document.querySelectorAll('.msg-sel input').forEach(cb => cb.checked = false);
}

async function confirmMultiSave() {
  const checked = document.querySelectorAll('.msg-sel input:checked');
  if (checked.length === 0) {
    toast('请先勾选要保存的消息');
    return;
  }

  const messages = [];
  checked.forEach(cb => {
    const msgId = cb.dataset.msg;
    const row = document.getElementById(msgId);
    if (!row) return;
    const role = row.classList.contains('user') ? 'user' : 'assistant';
    const bubble = row.querySelector('.msg-bubble');
    if (bubble) {
      messages.push({ role, content: bubble.textContent });
    }
  });

  try {
    await apiSaveObsidian(bookName || '未命名', messages);
    toast('已保存 ' + messages.length + ' 条消息到 Obsidian', 'success');
    exitSaveMode();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function showThinking(text) {
  const bar = $('#thinking-bar');
  $('#thinking-text').textContent = text;
  bar.classList.add('visible');
}

function hideThinking() {
  $('#thinking-bar').classList.remove('visible');
}

function showConfirmDialog(msg, onConfirm) {
  const dialog = $('#confirm-dialog');
  $('#confirm-msg').textContent = msg;
  dialog.classList.add('open');

  const okBtn = $('#confirm-ok');
  const cancelBtn = $('#confirm-cancel');

  const cleanup = () => {
    dialog.classList.remove('open');
    okBtn.removeEventListener('click', handler);
    cancelBtn.removeEventListener('click', cleanup);
  };

  function handler() {
    cleanup();
    if (onConfirm) onConfirm();
  }

  okBtn.addEventListener('click', handler);
  cancelBtn.addEventListener('click', cleanup);
}

// ======================================================================
// I. SETTINGS PANEL LOGIC
// ======================================================================
function setupSettingsPanel() {
  const slider = $('#ctx-slider');
  const number = $('#ctx-number');
  const current = $('#ctx-current');

  slider.addEventListener('input', () => {
    number.value = slider.value;
    current.textContent = slider.value;
    contextLimit = parseInt(slider.value);
    saveSettings();
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
  });

  number.addEventListener('input', () => {
    let val = parseInt(number.value) || DEFAULT_CONTEXT_LIMIT;
    const maxCtx = getContextMax();
    val = clamp(val, 8000, maxCtx);
    slider.value = val;
    number.value = val;
    current.textContent = val;
    contextLimit = val;
    saveSettings();
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
  });

  // chinese only toggle
  $('#chinese-only').addEventListener('change', function() {
    chineseOnly = this.checked;
    saveSettings();
    renderReaderArea();
    recalcChapterTokens();
    toast(chineseOnly ? '已切换为仅中文' : '已切换为显示全文');
  });

  $('#vault-path').addEventListener('change', function() {
    vaultPath = this.value || DEFAULT_VAULT_PATH;
    saveSettings();
  });

  $('#system-prompt').addEventListener('change', function() {
    customSystemPrompt = this.value;
    saveSettings();
  });

  $('#btn-restore').addEventListener('click', () => {
    contextLimit = DEFAULT_CONTEXT_LIMIT;
    chineseOnly = true;
    vaultPath = DEFAULT_VAULT_PATH;
    customSystemPrompt = '';
    applySettingsToForm();
    saveSettings();
    updateContextBar();
    updateWarningBar();
    updateSendButtonState();
    renderReaderArea();
    toast('已恢复默认设置');
  });

  // modal open/close
  $('#btn-settings').addEventListener('click', () => {
    applySettingsToForm();
    $('#settings-modal').classList.add('open');
  });
  $('#modal-close').addEventListener('click', () => $('#settings-modal').classList.remove('open'));
  $('#settings-modal').addEventListener('click', e => {
    if (e.target === $('#settings-modal')) $('#settings-modal').classList.remove('open');
  });
}

// ======================================================================
// J. COLUMN DIVIDER SETUP
// ======================================================================
function setupDivider(did, lid, rid) {
  const d = document.getElementById(did), l = document.getElementById(lid), r = document.getElementById(rid);
  if (!d || !l || !r) return;
  let down, sx, sl, sr;

  // restore saved widths
  const savedLW = localStorage.getItem('col-width-' + lid);
  const savedRW = localStorage.getItem('col-width-' + rid);
  if (savedLW) l.style.width = savedLW + 'px';
  if (savedRW) r.style.width = savedRW + 'px';

  d.addEventListener('mousedown', e => {
    e.preventDefault();
    down = true; d.classList.add('dragging');
    document.body.classList.add('drag-resizing');
    sx = e.clientX; sl = l.getBoundingClientRect().width; sr = r.getBoundingClientRect().width;
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!down) return;
    const dx = e.clientX - sx, nl = sl + dx, nr = sr - dx;
    const lmin = lid === 'sidebar' ? 180 : 250, rmin = rid === 'reader' ? 250 : 300;
    if (nl >= lmin && nr >= rmin) { l.style.width = nl + 'px'; r.style.width = nr + 'px'; }
  });
  document.addEventListener('mouseup', () => {
    if (!down) return; down = false;
    d.classList.remove('dragging');
    document.body.classList.remove('drag-resizing');
    document.body.style.cursor = '';
    // save widths
    localStorage.setItem('col-width-' + lid, parseInt(l.style.width));
    localStorage.setItem('col-width-' + rid, parseInt(r.style.width));
  });
}

// ======================================================================
// K. APPLICATION INITIALIZATION
// ======================================================================
async function init() {
  // 1. Load settings from localStorage
  loadSettings();
  applySettingsToForm();

  // 2. Restore font size
  globalFontSize = parseInt(localStorage.getItem('readerFontSize')) || FONT_DEFAULT;
  applyFontSize(globalFontSize);

  // 3. Load history
  renderHistoryList();

  // 4. Load Ollama models
  const models = await apiLoadOllamaModels();
  const select = $('#model-select');
  select.innerHTML = '';

  if (models.length > 0) {
    const ollamaGroup = document.createElement('optgroup');
    ollamaGroup.label = '本地 Ollama';
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = 'ollama:' + m.name;
      opt.textContent = m.name;
      ollamaGroup.appendChild(opt);
    });
    select.appendChild(ollamaGroup);
    currentModel = 'ollama:' + models[0].name;
    // 恢复该模型的上下文设置
    if (contextLimitByModel[currentModel]) {
      contextLimit = contextLimitByModel[currentModel];
    }
    // update ollama default display
    $('#ctx-ollama-default').textContent = models[0].context_length || 32768;
  } else {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'Ollama 未运行';
    opt.disabled = true;
    select.appendChild(opt);
    toast('⚠️ Ollama 未运行，请先执行 ollama serve', 'error');
  }

  // DeepSeek options
  const dsGroup = document.createElement('optgroup');
  dsGroup.label = 'DeepSeek (云端)';
  ['deepseek-v4-flash'].forEach(name => {
    const opt = document.createElement('option');
    opt.value = 'deepseek:' + name;
    opt.textContent = name;
    dsGroup.appendChild(opt);
  });
  select.appendChild(dsGroup);

  if (currentModel) {
    select.value = currentModel;
  }

  // 5. Model change handler
  select.addEventListener('change', function() {
    handleModelChange(this.value);
  });

  // 5b. Badge click handlers — 本地/云端切换
  const badgeLocal = $('#badge-local');
  const badgeCloud = $('#badge-cloud');
  if (badgeLocal && badgeCloud) {
    badgeLocal.addEventListener('click', function() {
      if (this.classList.contains('active')) return;
      this.classList.add('active', 'local-active');
      badgeCloud.classList.remove('active');
      const firstLocal = select.querySelector('optgroup[label="本地 Ollama"] option');
      if (firstLocal) {
        select.value = firstLocal.value;
        handleModelChange(firstLocal.value);
      }
    });
    badgeCloud.addEventListener('click', function() {
      if (this.classList.contains('active')) return;
      this.classList.add('active');
      this.classList.remove('local-active');
      badgeLocal.classList.remove('active', 'local-active');
      const firstCloud = select.querySelector('optgroup[label="DeepSeek (云端)"] option');
      if (firstCloud) {
        select.value = firstCloud.value;
        handleModelChange(firstCloud.value);
      }
    });
  }

  // 6. Update status bar
  updateStatusBar();

  // 7. Set up column dividers
  setupDivider('divider-1', 'sidebar', 'reader');
  setupDivider('divider-2', 'reader', 'chat');

  // 8. Load conversation from localStorage
  const savedConv = loadConversation();
  if (savedConv.length > 0) {
    conversationHistory = savedConv;
    renderConversation(savedConv);
    // calculate conversation tokens
    const allText = savedConv.map(m => m.content).join('\n');
    apiCountTokens(allText, currentModel).then(t => {
      conversationTokens = t;
      updateContextBar();
      updateWarningBar();
    });
  }

  // 9. Set up all event listeners
  setupEventListeners();

  // 10. Update context bar
  updateContextBar();
  updateWarningBar();
  updateSendButtonState();

  console.log('📚 EPUB 阅读器已就绪');
}

function setupEventListeners() {
  // File upload
  $('#btn-upload').addEventListener('click', () => {
    $('#file-input').click();
  });
  $('#file-input').addEventListener('change', function() {
    if (this.files && this.files[0]) {
      handleFileSelected(this.files[0]);
      this.value = '';
    }
  });

  // Chapter search
  const searchDebounced = debounce((query) => {
    renderChapterList(query);
    // 搜索词高亮：重新渲染阅读区
    if (selectedChapters.size > 0) renderReaderArea();
  }, 150);
  $('#chapter-search').addEventListener('input', function() {
    searchDebounced(this.value);
  });

  // Clear search button
  $('#search-clear').addEventListener('click', () => {
    $('#chapter-search').value = '';
    renderChapterList('');
    if (selectedChapters.size > 0) renderReaderArea();
  });

  // Select all checkbox
  $('#select-all-checkbox').addEventListener('change', function() {
    const q = ($('#chapter-search').value || '').toLowerCase();
    if (this.checked) {
      chapters.forEach((ch, i) => {
        if (!q || ch.title.toLowerCase().includes(q) || (ch.text || '').toLowerCase().includes(q) || (ch.text_cn || '').toLowerCase().includes(q)) {
          selectedChapters.add(i);
        }
      });
    } else {
      chapters.forEach((ch, i) => {
        if (!q || ch.title.toLowerCase().includes(q) || (ch.text || '').toLowerCase().includes(q) || (ch.text_cn || '').toLowerCase().includes(q)) {
          selectedChapters.delete(i);
        }
      });
    }
    renderChapterList(q);
    recalcChapterTokensDebounced(100);
  });

  // Send button
  $('#btn-send').addEventListener('click', sendMessage);

  // Reset button
  $('#btn-reset').addEventListener('click', resetConversation);

  // Save mode toggle
  $('#btn-save-toggle').addEventListener('click', () => {
    if (!saveMode) {
      enterSaveMode();
    } else {
      confirmMultiSave();
    }
  });

  // Warning bar close buttons
  $('#close-warn-40k').addEventListener('click', () => {
    warning40kDismissed = true;
    $('#warning-40k').style.display = 'none';
  });
  $('#close-warn-85').addEventListener('click', () => {
    warning85Dismissed = true;
    $('#warning-85').style.display = 'none';
  });

  // Clear history + reset current book
  $('#clear-history').addEventListener('click', () => {
    if (confirm('确定要清空所有内容吗？（包括当前书籍和对话）')) {
      clearHistory();
      resetBookState();
    }
  });

  // Font controls
  $('#font-smaller').addEventListener('click', () => adjustFont(-1));
  $('#font-larger').addEventListener('click', () => adjustFont(1));

  // Settings panel
  setupSettingsPanel();

  // Confirm dialog close
  $('#confirm-dialog').addEventListener('click', e => {
    if (e.target === $('#confirm-dialog')) $('#confirm-dialog').classList.remove('open');
  });

  // Global keyboard shortcuts
  document.addEventListener('keydown', e => {
    // Escape: close modals / exit save mode
    if (e.key === 'Escape') {
      if ($('#confirm-dialog').classList.contains('open')) {
        $('#confirm-dialog').classList.remove('open');
      } else if ($('#settings-modal').classList.contains('open')) {
        $('#settings-modal').classList.remove('open');
      } else if (saveMode) {
        exitSaveMode();
        toast('已退出保存模式');
      }
      return;
    }

    // Ctrl/Cmd + =: font larger
    if ((e.ctrlKey || e.metaKey) && e.key === '=') {
      e.preventDefault();
      adjustFont(1);
    }

    // Ctrl/Cmd + -: font smaller
    if ((e.ctrlKey || e.metaKey) && e.key === '-') {
      e.preventDefault();
      adjustFont(-1);
    }
  });

  // Click outside → exit save mode (点击保存按钮/消息复选框以外的地方自动退出)
  document.addEventListener('click', function(e) {
    if (!saveMode) return;
    const target = e.target;
    // 点击保存按钮本身 → 不退出（由 btn-save-toggle handler 处理）
    if (target.closest('#btn-save-toggle')) return;
    // 点击消息复选框或消息行 → 不退出
    if (target.closest('.msg-sel') || target.closest('.msg-row')) return;
    // 点击 modal/toast → 不退出
    if (target.closest('.modal-overlay') || target.closest('#toast-container')) return;
    // 其他地方 → 退出
    exitSaveMode();
  });

  // Textarea auto-resize
  $('#chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
  });

  // Enter 发送 / Shift+Enter 换行（IME 组合输入时不触发）
  $('#chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      const val = this.value.trim();
      // 有内容且不在流式输出中才发送，否则保留换行
      if (val && !isStreaming && selectedChapters.size > 0) {
        e.preventDefault();
        sendMessage();
      }
      // 空输入或无章节时，Enter 正常换行
    }
  });
}

// Font size management
function applyFontSize(size) {
  globalFontSize = size;
  localStorage.setItem('readerFontSize', size);
  document.documentElement.style.setProperty('--content-font-size', size + 'px');
}

function adjustFont(delta) {
  applyFontSize(clamp(globalFontSize + delta, FONT_MIN, FONT_MAX));
}

// ======================================================================
// STARTUP
// ======================================================================
document.addEventListener('DOMContentLoaded', init);
</script>
